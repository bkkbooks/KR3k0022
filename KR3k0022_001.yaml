body:
  text: 八面鋒卷一宋陳傅良撰至言若迂有益於國生財圖治養士論戰仁人之言其始若迂闊而不可行及要其終而究其所成則夫取利多而終以無弊者無有能過其説故夫子之於衛嘗欲正名而子路笑之矣有若之於魯嘗欲以徹而魯君非之矣夫衛之亂若非正名之所能理而魯之飢若非徹之所能捄然而欲無飢與亂則莫若此二者何者其取利也逺故取之多而民不知其致力也深故政不暴而事有漸國家當以匱財為常勿以乏用為懲當以養財為急勿以聚財為意優游以當之暇裕以待之節用以為之先通濟以為之權崇本以為之政謹察州縣以為之紀綱賑恤災害以為之左右愚非為是長者之言不急之説事理之極至葢如此也昔劉晏之在唐號為善理財者而晏之言曰戸口滋多賦税自廣觀晏之言不啻不知為利正當傾倒坐困耳然財非天雨鬼輸不厚其所出而厚其所取其末不可繼此理固無難曉者晏之言若緩而切若迂而直若費而優不能使人不悠悠於此爾至於錢流地上報政無留然後前日之所謂悠悠者於此始决然矣梁惠王以利國問孟子而孟子對以仁義曹劌以戰問魯莊公而莊公對以聴獄夫仁義非所以為利而聴獄亦非所以為戰古之君臣雖若迂闊而不切於事情也然天下之理未有仁而遺其親未有義而後其君彼以利而責望民則民散而為利之從而卒不獲吾之所求矣孟子之言非有見於斯乎獄死地也戰亦死地也人之在縲絏之中錙銖之施視若金石毛髮之惠視若丘山使君臨一國者小大之獄皆必用情有哀矜之意而無喜怒之私則是昔之居死地者嘗受其賜今安得不赴死地以答其賜哉民既樂為之死則陷堅却敵特餘事耳莊公之言非有見於斯乎班超不擾事見後衛之亂而孔子正名秦楚交兵而孟子言義葢非正名不能己亂非言義不能息兵故也興大利者不計小害冗官冗兵郊賞入粟習射用兵水利民兵天下之患莫大於逆其所不可為而止以其可為而為之庶乎其有成也逆其不可為而止則天下無可成之功矣何者天下未嘗有百全之利也舉事而待其百全則亦無時而可矣聖人之舉事也利一而害十有所不忍為利十而害一當有所必為利害之相當有所不能為以其害之相當雖得其利而其為害亦足以償矣不若安於無事之為愈也漢髙帝捐黄金四萬斤與陳平以間楚之君臣既而項王果疑范增而增謝病以去向使髙帝計一時之小費而有所愛於平則楚之君臣何至於相疑乎漢景帝從周亞夫之計以梁委吳而不顧其母弟之親既而吳楚之兵盡鋭於梁而亞夫得以破七國向使景帝顧區區之私愛而有所顧於梁則七國之鋒何為而可挫乎諸郡棹卒多費糧穀吳漢欲罷之而光武卒從岑彭之請而不遣葢蜀之功茍可以是集則糧穀不足較也出内庫百五十萬緡以賜魏博左右以為與之太多而憲宗卒從李絳之言而不吝葢魏博六州之心茍可以是結則府庫不足計也若夫楚子重伐吳而克鳩畏吳報楚而取駕君子以為所獲不如所亡則子重不為可也漢武帝捕虜斬首征伐四克而士馬物故亦略相當君子以為利不十者不易業功不百者不變常則武帝不為可也夫去猛虎之為害者焚山而不顧野人之菽粟去蛟蚖之為患者斷流而不顧漁人之網罟天下之事其所利者大則其所害者小固有國者之樂為也趙欲以長安君質齊太后不可大臣强諌太后益怒左師觸龍以其王趙之福一説而行之是王趙之利大而質齊之辱不足計也漢髙皇捐黄金數萬斤與陳平以間楚恣其所為不問出入而楚之君臣卒以相疑而至於亡是亡楚之利大則黄金之費不足愛也忍棄其所不可棄者必有其不可棄者也刃在頭目斷指不顧病在心腹灼膚不辭彼豈以為不足愛而棄之哉是必有其不可棄者而奪其愛也隂去其弊則怨不生勸農限田任子郊賞冗官堅兵守逺奔競人有常言天下之事茍有當於理雖拂乎人情勿䘏也吾則非之曰事雖當於理而情則拂乎人而事不能以終濟莫若隂有以去之使人由之而不知而怨亂不作之為愈也漢人不力農使之力農未必樂也惟晁錯以為不若使之入粟者賜爵則農自勸楚人不事蠶使之事蠶未必樂也惟髙郁以為不若使之輸税者以帛而代錢則蠶自勸諸侯之彊大削之則必變也而賈誼以為分王其子弟則有以悦其心而其勢自弱荒逺之屯敵至則棄而走陸贄以為募士使居焉則人當自為戰夫天下之弊貴乎隂有以去之則事無有不濟者矣工於所察遺於所玩𣙜酤任子度牒省官敦俗異端農桑士大夫之有為於斯世未嘗不為去弊之説而多至於遺其耳目之所玩是以弊之在天下去之雖若甚多而算計見効茫然如捕風搏影卒不能有益於人之國也圜坐而議政皆曰官不可不省也而至於任子之弊三年之郊動以萬計此最為濫官之大者則習以為常而不怪皆曰俗不可不敦也而至於𣙜酤之弊倡優幄帟耀市而招之此最為傷風敎之甚者則恬然不以為恥異端皆言不可長而度牒之降則未有能為之言者農桑皆言不可緩而末作之熾則未有能為之一説如此等弊士大夫不惟不能言之亦且不自知之耳目習熟玩以為常不知其源之濁則其流無自而清其表之枉則其影無自而正也示人以法不若以意勸農任官懲貪聚斂田子與隰子登臺南望不言而隰子知其意在於伐宋齊威公謀於臺而口吃而役人知其意在於伐莒曹公下鷄肋之令而楊脩知其意在於退師上之人舉目搖足而天下已知其意之所在是故以法示人不若以意示人其意在是其法不在是則不令而自行其法在是其意不在是則雖令而不從漢文帝詔書數下歲勸民耕殖而野不加闢至於示敦朴以為天下先而富庻之風自還意之所重無待於法也唐徳宗即位用楊炎議作兩税法新舊色目一切罷之未幾刻剥之令紛然繼出法雖備具意常誅求也人主無不洩之意而宻意常在於所向之外天下之人伏其外而窺其中以其洩而得其宻是故背人主之所令以隂合其所向天下之情甚易曉也子之養親也膾炙以為羞禮也蛙蛤以為進非禮也父告子以所膳必曰膾炙而不曰蛙蛤也然退而察其親則蛙蛤之為嗜為子者何憚而不進之以蛙蛤哉夫父曰膾炙而子曰蛙蛤曷為不以其所命而以其所不命耶葢其所命者飾也其所不命者真也齊威公謀於臺而口吃人知其伐莒揖朝而遜人知其擇術任官之道示之以法不若示之以意其法是也其意非也雖重而亦輕其意是也其法非也雖輕而亦重且學士之任未為崇貴也唐太宗一貴尚之而天下之人歆豔羨美徃徃指為登瀛洲者非重其官也重其意也師儒之官學者之指南也魚朝恩一升講座而縉紳名流恥與之列徃徃以横經講道為鄙非輕其官輕其意也荀子曰人主之患不在乎不言用賢而在乎誠必用賢夫言用賢者口也却賢者行也口行相返而欲賢者之至不亦難乎法令之行當自近始抑奔競懲貪吏戒聚斂禁侈靡蘇文忠公厲法禁之説曰聖人之制刑知天下之畏乎刑也是故施其所畏者自上而下公卿大臣有毫髮之罪不終朝而罷隨之是以下之為不善者知其無有不罰也至哉斯言夫天下之所謂權豪貴顯而難令者此乃自古聖人之所借以徇天下也舜誅四凶而天下服何也此四族者天下之大族也夫惟聖人能擊天下之大族以服小民之心故其刑至于措而不用周之衰也商鞅韓非嶮刑酷法以督責天下然其所為得者用法始於貴戚大臣而後及于䟽賤故能以其國霸由此觀之商鞅韓非之刑非舜之刑而所以用刑者亦舜之術也商鞅欲變秦法而不赦公孫賈之貴幸趙武靈王欲行胡服而不恤公子成之異議趙奢欲收租税雖平原君之貴殺其用事者九人方今馭吏之難莫難於贓吏葢朝廷亦求所以禁之矣而未嘗得所以禁之之方寛以養其廉則嘗狃上之寛而不知畏繩之以法則慮其怨而不服抑將何以處也愚以謂用寛不如用度用法不若先服其心天下心服而後法可盡行贓可盡禁也夫何故天下之所以服者常生於不偏而其不服也常起於不平孟子曰夫子敎我以正夫子未出於正也己不正而正諸人父不能以行其子况正天下而不出於正者誰也豈非朝廷之大吏耶大吏而不正不正而法不行矣至於舉法以禁小吏宜其怨而不服矣昔陸宣公之秉政至於蕃鎮之鞾鞭亦確不受雖徳宗喻之而不奉詔以為鞾鞭之一弊必至於金玉則今之大吏省卒徒自給者恬不知禁而箱篚之大於鞾鞭者亦熟視而不問此何理哉大吏不正而責小吏法畧於上而詳於下天下之不服固也大體立則不恤小弊用嚴取士役法茶鹽勅令合抱之木不能無數寸之朽徑寸之珠不能無微纇之嫌良法之在天下吾固知其不能無小弊也惟其大體既正則小弊有所不足慮矣是故夏道尊命商人尊神周人尊禮而當時不文之弊三代卒不以是而廢其所尊夏政尚忠商政尚質周政尚文而當時以野以鬼以僿之弊三代亦不以是而變其所尚誠以其大體既正則微疵小害雖時有之亦埶之所不免也漢文帝除肉刑定笞法而或者議其外有輕刑之名内實殺人是不知文帝之大體也宣帝樞機周宻綜核名實而或者議其王成之賞趙葢楊韓之誅是不知宣帝之大體也天之春温而秋凛春豈無一日之寒秋豈無一日之熱哉亦不失四時之體而已傳曰本必先顛而後枝葉從之管仲曰四維不張國乃滅亡韓子曰紀綱者脉也脉不病雖瘠不害脉病而肥者死矣左氏之所謂本管仲之所謂維韓氏之所謂脉吾之所謂體也固其本張其維夀其脉大體立矣區區之小弊不足深慮也唐世之法大抵嚴於治人臣而簡於人主之身徧於四境而不及乎其家州閭鄉井斷斷然施之實政而宗廟朝廷之上所謂禮樂者皆虚文也當是時坊團有伍而閨門無政古人制度宜不如此上下以相維而父子夫婦不足保古人紀綱宜不如此世業府兵租庸調省府藩鎮周人之大不若邾莒存於戰國相吞噬之間殆數百年獨立於既弱之後雖秦楚三晉之彊猶有所畏而不敢動秦之彊加於吳越不二世而匹夫荷梃奪之曾不若周人既弱之後唐贊曰髙祖之興亦何異因時而起者歟雖其有治有亂或絶或微然其有天下年幾三百可謂盛哉豈非人厭隋亂而䝉德澤繼以太宗之治制度紀綱之法後世有以憑藉扶持而能永其天命歟漢承秦後民始息肩蕭何作畫一之法曹參載清净之説後之議者謂參幸當與民更始之際不能立法度興禮樂為漢建長乆之計不知秦鼎沸亂息薪為策秦病煩熱安形為務漢治之大體正在於清净不擾撫摩其痛痒勞來其呻吟與之相生養之具假其歲月以極其涵養之功而返忠厚渾朴之氣如斯而已必欲從事於區區之弊如漢儒所謂改正朔易服色定歴數協音律作詩書建封禪果足以救當時之瘡痍凋瘵輕浮鍥薄之習乎以文帝之聖豈不足於建立奏更法令循於茍且請興禮樂謙遜未遑方且鎮之以淵黙示之以敦朴守之以木强敦厚之吏雖稽古禮文之事缺然亦畧不以為意豈不曰漢家制度雖云未具而大體不可亂耶八面鋒卷一
