body:
  text: 八面鋒卷五宋陳傅良撰用人之法當察其內陛辭朝見審察人之言曰物至而後鑑得用其明事至而後君子得用其情若弗接乎吾前則泯然矣能耶否耶吾且不得而見而况能察歟是說然矣然人才之能否未易察也退然如不勝衣而能以晉國霸今將求之以壯勇則失之矣年老短小而能使盜賊解散今將求之以奇偉則失之矣應對鄙拙而能反風滅火今將求之以文辨則失之矣是夫人之才實者不易察如此也齒若編貝目如垂珠而持論不根則容貌不足以取人矣丰姿詳雅神精明秀而誤天下之蒼生則丰采不足以取人矣踔厲風發常屈挫人而諂事羣小則議論不足以取人矣是夫人之虛僞者不易察也如此人主於此將孰從而察之歟聞之曰人才之在天下當索之於內不當求之於外當考之以實不當信之以文夫詐而似智佞而似忠遲鈍而得深謀鄙薄而能立事人主鮮有不惑於此夫惟索其內而窺之即其實而觀之心鑑內明天機洞照於一見之頃而得之於耳目之外則是非能否瞭然不能欺矣昔漢武帝知人善任使其於一世之人才亦嘗致其察矣獨惜其舍內而徇外遺實而取文夫是以所用者皆非真材實能衛霍之容甚武也則用之張周桑孔之狀甚鋭而巧也則用之公孫鄒枚儒服儒言甚秀而文也則又用之至於汲黯之質直今日詆其戇明日誚其無學又明日怒其妄發徙之內史遷之淮陽當是之時茍非震整而翹秀便捷而奮發帝皆有所不快焉然愈多而愈不濟一用之則一窮嘗讀吾丘夀王傳觀其書責之曰子在朕前之時智略輻湊以為天下少雙海內寡二及至連十餘城之守任四千石之重職事並廢盜賊縱橫甚不稱前之時是不察其內而徒信於其外則稱意於前而不稱意於後失人而然也厥後宣帝綜核名實拜刺史守相輒親見問觀其所以然其懲武帝之弊而得之歟是故人主之觀人要當以武帝為戒以宣帝為法繩下嚴則人不敢盡茍且怠惰緘默阿諛君臣之間可以相忘而不可以相忌也相忌之隙開君臣之道喪矣且天下之事無定形也見其賢而舉之以進善也而可疑以植黨見不肖而去之以絶惡也而可疑以立威興作之鄰於生事也安靜之似於因循也忠直者疑於訕上也慮患者近於妖妄也謂之是可也謂之非亦可也無有必然可指之定形也茍人主牽於意忌而操疑吾不信之心士亦孰肯冒而為之以自速於禍也耶大凡憂畏生於不足猜忌起於有間上之繩下也太嚴則下之奉上也不敢自盡故操權急者無重臣持法深者無節士何者有所拘者不能有所縱戚然自危必不敢泰然安意為之也嗚呼人君之禁其臣使之懼不免之不暇屏迹以逃嫌損威以避禍豈國家之福也哉古之大臣其操心也不危其臨事也不忌是以優游閒暇而能有所建立蓋昔者堯之咨四嶽曰孰能治是水四嶽曰鯀可曰孰能㢲朕位四嶽曰舜可鯀方命圯族雖堯亦度其不可用而四嶽乃以甚不肖之人而猥充至重之責自今觀之必曰是誤國也舉天下而與人此豈細事哉而四嶽遽以天下之匹夫上干天子之正位自今觀之必曰是非當言也舜命禹征有苖已誓師往而益以一言贊禹禹遂班師遽為之誕敷文德而有苗格舜命禹徂征禹既行而益有言宜告之舜不告舜而告之禹禹承命於舜及其不遂行也宜先禀之舜乃擅退兵而不疑自今觀之則益之言可以謂之沮壞成事而禹之事乃逗留君命古之君臣其相體悉也如此一德一心相與忘機於形骸之外小過不責大言不怒然後能濟天下之功三代以還上忌其下下疑其上為天子大臣而瑟縮踧踖常若有所掣其肘而係其足左顧右盼惟恐人主之議其後吾觀漢武帝以剛明之資督責臣下自李蔡嚴青翟趙周數相駢死牢户石慶雖僅以謹論亦數被譴公孫賀至於涕泣不敢受命當時視處鈞衡之地如以其身蹈不測之淵也至於宣帝其忌刻又過之趙蓋韓楊之倫以微罪誅其它自全惟陳萬年之順從丙吉之謙謹而已髙才之立其朝者未始不纍之也世多咎衛青之事武帝不招士張安世之事宣帝不薦賢嗟夫魏其武安以厚賔客為天子切齒霍將軍以秉權位萌驂乘之禍其鍳未逺也况青精兵百萬抗威沙漠安世身統禁旅司國之命此固武宣之所側視貌親而心難之者使其招士進賢以收士大夫之譽其能免乎故其天子之大臣當使之施為措注不盡拘於繩墨規矩之間間有所斡旋提挈以讋服天下之情當使開胸露臆以與天子共推無疑之心不可為曲廉細謹以自免於吏議可也今之大臣坐於廟堂何其凛凛如燕之巢於幕也平日所論薦者才氣雄偉足以任重致逺者何人也議論俊拔足以為安而慮盡者何人也幹局明練足以剸煩而解紛者何人也大抵阿諛緘默茍且怠慢如立仗馬如轅下駒耳此無他禁人已甚則人始逃嫌而避禍也心知其利而不能以盡為明見其害而不能以盡去拱手帖耳以僥幸於久安而不奪尺寸違之則事未及為而以失律報罷矣為今之計莫若以堯舜為法以漢武宣之事為戒公卿侍從之間略其小失而責以大綱使之稍稍然釋去肩背之芒刺從容胖肆措意於法令之外而後茍且怠惰阿諛緘默有所不禁而自風休雪釋也小有所屈大有所伸存紀綱養士氣制私情聽直言人主之有為於天下其心未嘗不欲朝廷之尊而紀綱之肅也而人主之所為則每有以自隳其尊而壞其所謂肅然者以其道不足以制欲故也蓋朝廷紀綱之所係莫大於法而所以守是法而無所撓屈者莫重於人臣然臣守之於下而君每抑之於上欲心一動勃鬱熾烈惟恐夫人執法以沮吾之意而不得以快其所欲不知夫稱快於一時者乃所以自壞其維持天下之具愚諂者撓法以從君於昏忠義之士氣沮勢奪則慨然引去卒至於剝落解散不可收拾而危亡不旋踵而至蓋小有所伸則大有所屈勢之必然而理之固然也古之賢君氣聽命於心情受制於禮蓄威屈勢使守職不為所奪得以自伸凡法之所在雖卑且賤不敢震之以威從其所重夫是以朝廷尊而主威為之振紀綱立而姦邪為之寢古之人有行之者漢文是也細栁之師親屈帝尊而勞之聞軍中不馳之令則按轡徐行盜環犯蹕之罪赫然發怒欲誅之聞張廷尉不奉詔之言則樂受而無難色鄧通之貴幸其寵之非不至也一戲於殿上則丞相申屠嘉檄召欲斬之夫以天子之尊而庇一弄臣則孰敢誰何者而嘉持法召之不疑帝亦遣之不吝必俟其巳困辱然後徐遣使持節以謝丞相而召之太子君之二梁王太后之愛子其勢非不尊也一不下司馬門則公車令張釋之追止而劾奏之夫以父子兄弟之親而少差以禮亦未嘗為甚過者而釋之持法劾之不恕帝亦受之不卻必免冠謝太后以教太子不謹然後太后承教而赦之夫漢廷諸公之所為自敵已以下受之而不能堪而文帝斂威抑氣使將軍得以行其令使丞相得以舉其禮使廷尉得以執其法不牽於愛不役於情伸臣下之所為以肅朝廷之紀綱當是時上而宰相下而百司內而朝廷外而軍旅法之所在凛若秋霜隱若雷霆窺伺之心息陵犯之風消非有孝武之光烈宣帝總核信必之政使然也蓋惟禮義以養其心和平以收其氣抑情以執法屈巳以伸臣下而已若漢景帝則不然溺於久安偃然有自用之心凡文帝之所為優容奬借不敢挫折其臣下以自壞者景帝一切反之非有功不侯此髙帝之法也而王信奈何欲侯之封同姓以填天下此髙帝之法也而鼂錯奈何欲紛更之故周亞夫執舊約以爭外戚之封申屠嘉因奏廟堧以欲誅紛更之臣此二者固宏綱大法之所在神器宗廟之所賴以維持全安於無窮者而景帝皆挫抑不用一餓死一毆血死王信果侯鼂錯果用則景帝一時豈不進退如意而甚快也哉然亞夫死而王信侯則毁髙帝之典刑而啓封拜外戚之端申屠死而鼂錯用則紛更髙帝之法而啓吳楚七國之禍愚故曰小有所伸則大有所屈者此之謂也夫立法以維持天下其大者猶宫室之上棟梁垣其小者蓋瓦級磚非甚狂惑孰肯自隳其垣棟而自揭其菅籍哉惟其情欲之來志氣不能以自禁隨動而流隨觸而勃遂至於潰裂四出甚壞而不可救故夫至公無私我以存天下之法忍常情所不能忍於幾微眇忽之中而遏其橫流不可救之禍自非以氣御志以道勝情之君疇克爾哉武帝天漢中胡建得守軍正丞監軍御史為姦穿北軍壘垣以為賈區建約走卒誅之竟斬御史然後奏聞武帝報曰國容不入軍軍容不入國建何疑焉易成之效亦易以敗天下之患莫大於不可為亦莫大於可為而不慮其所終不計其所成簡略而始之利未見而害隨踵矣天下之事非簡略之所能久也以簡略而成必以簡略而敗古之聖人創制立法為萬世帝王程式必周詳而不敢輕謹密而不敢忽者非為其始之不足以成而憂夫終之易敗也非為其始之不足以得而憂夫終之易失也非為其始之不足以合而憂夫終之易散也天下之事如是足以成矣如是足以得矣如是足以合矣而必曰未也又從而節文之紀綱委曲為之表飾是以至于今而不廢及其後世求速成之功而倦於持久故其欲成也止於足以成欲得也止於足以得欲合也止於足以合其始不詳其終不勝其弊嗚呼有以文武周公之所以造周者告之乎三代令主維持天下之具莫詳於周吾嘗求其制度規摹矣凡紀之書歌於詩纎悉曲具列之於周禮所謂禮樂之本教化之端桑農之政任用之機以至刑禁之條目財貨之源流班班可考者皆其維持天下之具也夫文武周公豈不能略為之法簡為之制優游容與於闓端創始之初而乃汲汲若是耶天下之勢其成之也有基其立之也有本惟其栽培封殖之既固則枝葉未易以委枯惟其疏濬隄防之盡力則流派未易以潰裂萬世子孫有所憑藉扶持而不至於陵遲大壞者皆出於此若夫漢髙帝之寬仁足以掃秦之禁網信義足以勝楚之威力其資美矣獨於萬世子孫之計有愧於三代是豈非苟為之心入之而闓端之初遂至於簡且略耶禮由天作樂以地制先王以是而窮一性之源本陶萬彚之中和又豈可輕為而輕視帝乃甘於亡秦卑陋之習俯首於叔孫綿蕞之儀至有度吾能行之語吁貶道從已一至於此稽之王制寧有不愧惟髙帝創法立制之原每每如此是以繼世之君如文帝之賢宜可與語王道也然聞釋之之奏乃甘心於秦漢之卑論觀賈生之䇿而未遑於禮樂之大典如宣帝之賢宜可與語王道也然有漢家之制而安於雜霸不法先王之統而敢於持刑豈非髙帝之規摹不逺簡略茍成而有以啓文宣之弊歟昔叔孫通與弟子共起朝儀髙帝曰得無難乎通曰臣願頗采古禮與秦儀雜就之上曰可試為之令易知度吾所能行為之張釋之補謁者既朝畢因前言便宜事文帝曰卑之無甚髙論令今可行也於是釋之言秦漢之間事文帝稱善昔有善陶者直必百金也嘗苦其難信然其器終身而不隳鄰之陶者直才數金人之市者踵至然朝用而夕隨傾之不能終以歲月是孰為之取舍哉八面鋒卷五
