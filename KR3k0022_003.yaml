body:
  text: 八面鋒卷三宋陳傅良撰兼才則隨所遇而能文武全材四科取士權攝省官昔者禹有功於水土也然禹之功不在於此而遇於此也使必以禹之賢不外是則其所能者不亦卑乎稷固有功於播種也然稷之所施不在於此而遇於此也使必以稷之所施盡於是則其所以及人者不亦陋乎伊尹之才該於所學故天下未定伐夏救民則身之天命所歸相與扶持而協贊則亦身之伊尹之學其初未期伐夏用也時乎伐夏則以除殘而已不伐夏則伊尹之學果無可施乎周公之才亦該於所學故三監作難舉兵而東征則為之淮夷既平而持盈守成則為之周公之學其初未言為東征計也時乎東征則以之平暴亂而已不東征則周公之學果無所為乎若夫後世之人則不然禆諶之智謀於野則獲謀於邑則否孟公綽之賢優於為趙魏老不可以為滕薛大夫黄霸之才長於治民及為丞相總綱紀號令風采不及丙魏功名損於治郡時薛宣所在而治為世吏師及居相位以苛察失名彼其才則誠有限而其器則誠有極也强其所不能冒而為之則亦敗事而已不習不能不久不精車戰習射民兵屯田水戰人皆曰居今而效古誠難也愚則曰居今而效古要之以目前誠難也要之以持乆不難也何者天下之事不習則不能不乆則不精齊楚之異音求其同焉固難也然居於莊嶽數年雖日撻而求楚語不可得者習之而久也胡越之同聲求其異焉固難也然長而成俗雖至死而不相違者習之而久也惟技也亦然庖丁之解牛也三年之後未嘗見全牛十九年之後刀刅若新發硎非習於解之之久乎紀昌之視虱也數月之間始浸大焉三年之後如車輪焉非習於視之之乆乎事之在天下大抵然也所患者其不能持之以至誠待之以歲月爾孰謂士大夫之習射兵之寓農有不可施於今日耶抑嘗以鄉兵水戰之事而觀之三丁擇一蠲其租賦閒月習射歲終大校李抱真施之於澤潞比三年而皆為精兵北人固不閑於南方之水也然造戰船數百命唐降卒敎北人水戰世宗行之於周而數月之後縱横出沒殆勝唐兵然則士大夫之射兵之寓農誠使講而習之習而乆之三代鄉射之法井田郊遂之制可復見於今日也法以治民不貴乎擾文科詳於法者有法外之遺姦工於術者有術中之隱旤藥所以治病也用藥已過則藥之所病甚於未藥耘所以治苗也耘之數數則蹂踐之害酷於稂莠凢天下用意過當之事往往舊害未除而新弊復作者其患正在此爾曹參為齊相避正堂舎葢公咨以治道得清净之説用以治齊不擾獄市粹然有君子長者之風其為繼蕭何為相舉事無所變更擇郡國吏木訥於文辭重厚長者為丞史吏之言文深刻欲務聲名者斥去之見人有細過專務掩匿覆葢之其相業猶治齊也後之議者謂參幸當與民更始之際不能立法度興禮樂為漢建長久之計茍倖其一旦之安而廢其經逺之慮葢不知參為漢建無窮之基者正此也自春秋戰國以及秦項之際縱横捭闔之説行而天下之俗浮刑名法家之説勝而天下之俗薄浮薄之風相扇相激而極為秦項之禍大漢之興民始息肩知有生人之樂也如病者出於九死之餘惟當屏絶外事安坐飲食以漸復其已耗之血氣雖未衣冠佩玉進趨揖遜君子固不以為廢禮也漢於斯時當洗滌吾民之瘡痍而撫摩其痛痒勞來其呻吟與之相生養之具假以歲月以極其涵養之功而措之既庻既富養生送死無憾之地不然變畫一而為紛更取清净而為煩苛飲淖之牛必欲易之以清净之水如漢儒所謂改正朔易服色定歴數協音律作詩樂建封禪者果足以救之耶參雖飲酒不事事其所好惡舉措養天下忠厚渾朴之俗以變二三百年輕浮鍥薄之習為慮深矣至於孝文之時告訐之俗易流風篤厚禁㒺䟽闊斷獄數百幾致刑措當是時稽古禮文之事缺然未備顧何損於治道也哉後世言治與文景以恭儉厚下之效推其涵養變化之功實參發之也曹參代蕭何為相屬其後相曰以齊獄為寄慎勿擾也後相者曰治無大於此者乎參曰不然夫獄市者所以并吞也今若擾姦人安所容乎班超為西域都䕶後有代之者問䇿於超超戒以不擾其人以平平笑之卒如超所料物之生林然熈然孰吾榮乎孰吾枯乎已然而莫知其然者其性也旦而曝之夜而濡之一日風之二日霖之三之日蕩然矣惟人亦然無攖則寧無拂則全驅之以刑齊之以政臨之以徳而天下之性蕩然矣堯之治天下不舉善不去惡不治小不敎大民視堯亦天耳天何心於我哉舜之治天下也必治之而後安雖然猶未始與民相攖也三王之於民如恐赤子之啼而亟乳之至五伯則又鞭朴隨其後也大道何從而行乎唐太宗嘗指殿屋而謂侍臣曰治天下如建此屋營創既成勿數改易茍移一榱正一瓦踐履動揺必有所損三人共牧一羊羊不得食人亦不得息令有不便則亦可收發運隅官民兵世之言曰事善不善特未定耳而令在必行則又有甚不然者漢髙祖聞酈生謀撓楚權欲復六國則稱善及聞張良之言則吐哺而罵唐李綱諫髙祖擢用舞胡為五品髙祖曰業已授之不可追也而陳嶽之論則以用之而非胡不可追夫稱善未幾繼之以罵業雖已授非而可追古之人曷嘗以是而為在位之累哉適足以明其無我而已仁宗朝實行簿為民害仁宗斷然罷之太上皇朝隅官為民害太上皇斷然罷之比年發運司為民害主上亦斷然罷之將有所奪必有所子抑遊民懲貪吏將有所奪必有所予予之者未至而奪之者先行人情不安也游手可抑也亦不可以盡抑也無田與之耕而欲閒民之不游手勢不可也故善抑游手者莫若井天下之田也仇餉可責也亦不可以遽責也無粟與之食而欲飢民之不仇餉勢不可也故善責仇餉者莫若足天下之食田一井而天下自爾無游手何用抑歟食一足而天下自爾無仇餉何用責歟縉紳士夫固非齊民之比而人情不甚相逺愚嘗怪今之議者徒知奪之之説而未知予之之説徃徃今日奏一議欲律天下之貪明日奏一議欲起天下之媮吾恐法外之姦愈生令行而詐愈起將至於用齊人之鼎鑊漢人之碪礩矣孝宣嘗增吏禄矣百石以下則益之百石以上則不增也光武亦嘗增吏禄矣千石以上反減於西京六百石以下乃增於舊秩二君之意豈輕其大而重其小哉誠以大吏禄賜有餘而小吏廪食不給也王荆公云方今制禄大抵皆薄州縣之吏葢六七年而後得三年之禄欲其無毁廉恥葢中人之所不能也故今官大者往往交賂遺營貲産官小者販鬻乞丐無所不為則媮墮取容之意起而矜奮自彊之心息職業安得而不弛治道何從而興乎士之貧者扶老攜㓜千里而就一官禄既薄矣而又州縣之匱乏者上官之私怒而不悦者有終歲而不得一金且夫假貸以徃也飢寒以居也狼狽以歸也非大賢君子誰能忍爾而曰爾無貪我有法豈理也哉是故莫若均天下利禄使其至逺者如其近者增其寡者如其豐者如此而猶不改則吾之法一用而天下服矣三代之井田齊之内政唐之府兵與夫口分世業之法當是時不聞有游食冗食之民也今日地少而民多欲耕無田欲蠶無桑欲樵無山欲漁無水欲坐而作無肆欲負而販無市則食于丐食于兵食于倡優食于胥史食于巫覡食于滛祀之祝食于佛老之使令無疑也彼冒愧而為之活旦莫焉爾矣用法公平則人無怨省官汰兵限年任子用刑昔管仲奪伯氏駢邑三百沒齒無怨言聖人以為難諸葛亮廢廖立為民徙之汶山及亮卒而立垂泣夫水至平而邪者取法鑑至明而醜者㤀怒水鑑之所以能窮物而無怨者以其無私也水鑑無私猶以免謗况大人君子懐樂生之心流矜恕之徳法行於不可不用刑加乎自犯之罪天下其有不服乎伊尹曰阿衡衡所以權萬物之輕重而歸於平周公曰太宰宰所以制百味之多寡而適於和惟其和平而已矣故為重為多者無所徳為輕為寡者無所怨衡宰之上實無心也故古之事君者亦無心而已昔叔向被囚而祁奚免之叔向不告免也而朝范滂被繫而霍諝理之滂往候之而不謝嗚呼國之大臣其用心如祁奚霍諝則名迹之或匿或見權勢之或逺或近皆可以兩忘也夫周之於商民至矣勸之之辭曰天惟畀矜爾我大介賚爾懼之之辭曰爾探天之威我致天之罰我豈以喜怒之私而行乎勸懲之間哉有天存焉吾聴之而已矣待商民以天不以巳意吾心無愧於天亦無愧於人矣夫商坐肆持權衡而售物銖而銖焉兩而兩焉鈞而鈞焉而不為人交手授物無敢出一語者茍隂合權衡而㒺利而所贏者僅若毫髮衆皆怒而棄之也東坡嘗論榷酤言自漢武帝以來至于今皆有酒禁刑者有至流賞或不貲未嘗少縱至私釀終不能絶也周公何以禁之曰周公無利於酒也以正民徳而已甲乙皆笞其子甲之子服乙之子不服何也甲笞其子而責之學乙笞其子而奪之食此周公所以能禁酒也法舉其畧吏制其詳銓選取士斷獄治郡古之治任吏而不任法後之治任法而不任吏古之人非廢法而不用也法舉其畧吏制其詳天下之利害吾知之吾為之上之人不吾禁也惟知要其成而責其効而已故天下之事可否廢置皆制於吏後之人非廢吏而不用也吏滿天下而以律拘之心知其利而不能以盡為明見其害而不能以盡去尺寸違之則事未及成而以失律報罷聞矣故天下之事可否廢置皆聴於法嗚呼國之有法猶古人之談兵也吏之用法猶今人之用兵也古人之所談者亦舉其大要云耳至於縱横變生出竒制勝則用兵者臨事而為之應如其以古人之所談者而拘之則亦敗事而已管仲之治齊商鞅之治秦舉一國之事而聴其施設焉故其富國彊兵之效亦有可觀龔遂之守渤海趙充國之降先零舉一方之事而從其便宜焉故其當時便宜之政撫御之畧皆得以濟其所欲任吏而不任法其效如此有天下者其可以無法而拘吏哉選法之弊其弊在於任法不在任官任法而不任官是故吏部之權不在官而在吏三尺之法適足以為胥吏取富之源而不足以為朝廷為官擇人之具所謂尚書侍郎郎官者㨿案執筆閉目而書紙尾而已是故今之注擬於吏部始入官則得簿尉自簿尉而得令丞推而上之則得幕職由是法也又上之至於守貳由是法也其宜得者則曰應格其不宜得者則曰不應格曰應格雖貪闒者疲懦者老耄者乳臭者愚無知者庸無能者皆得之得者不之愧與者不之難曰不應格者雖其實賢能廉潔才智皆不得也不得莫之怨不與者莫之恤也吏部者曰彼不怨不愧吾事畢矣如募役焉書其産之髙下而甲乙之按其役之久近而勞逸之吁一吏而閱之可盡矣賢不肖愚智何别焉宋以蔡廓為吏部尚書廓先使人謂宰相徐羨之曰若得行吏部之職則拜不然則否羨之答曰黄散以下悉委廓猶以為失職遂不拜葢古之吏部雖黄門散騎皆由吏部之選授則當時之為吏部者豈亦止取夫若今之所謂應格者而為黄散邪愚以為今之吏部要當畧小法而責大體使夫小法之有所可否而無係於大體之利害則吏部長貳得以出意而自决之要亦不失夫銓選之本體而不害夫法之大意則善矣八面鋒卷三
