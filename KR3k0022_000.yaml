  text: 欽定四庫全書子部十一
  hash: sha256:6fde423eff804002a73f9da4a96c88a4d581d1c7affa2bef6c291152bdc6238c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0022_WYG_000-1a, image: WYG0923/WYG0923-0989a.png}
body:
  text: 八面鋒目録類書類卷一至言若迂有益於國興大利者不計小害隂去其弊則怨不生工於所察遺於所玩示人以法不若以意法令之行當自近始大體立則不恤小弊卷二以勢處事以術輔勢不以小利傷國大體使人之畏不若使愧為治勿使人窺其迹處利害外則所言公卷三兼才則随所遇而能不習不能不乆不精法以治民不貴乎擾令有不便則亦可收將有所奪必有所予用法公平則人無怨法舉其畧吏制其詳卷四天下之名生於不足愛民當思所以防民法不慮其終者必壊人主好要則百事詳不為而後可以有為卷五用人之法當察其内繩下嚴則人不敢盡小有所屈大有所伸易成之效亦易以敗卷六事要其終知人用心議論不一理未嘗異法廢則人得肆其情任用不可使人取必逆耳之言不可不聴為治不可以圖美名去夫積弊當以其漸卷七不可以疑心聴人言民心難以小惠劫之人主當固結人心物以順至當以逆觀諫因其明處乃能入救弊毋為目前之計天下之事不能兩全利在一時害在萬世致治非難保治為難卷八用重刑者懼人之玩法無善惡在人所用行事雖同心術則異才與法合不患其宻不以或然而廢常然事有出於法度之外善念無力則為惡勝不以小節傷國紀綱士量力而趨於其事不可為而為之則凶卷九剛强生於柔弱之餘吏愛民則民亦愛吏公私兩便則為良法治世之灾皆為祥瑞用人不可倉卒責成法本便民反以害民良法多以權貴而沮良法不得其人則弊善興利者惟去其害卷十泛取者乃精取之法法令不信則吏民惑下之慢令生於自慢守法度所以繫民心立事不必執事之名書生太髙公卿太卑卷十一無事時當預求人才用人要當自有所見使人速得為善之利不可以成敗論人物民心以先入者為主事不足撓為不足憂人情不可使無所顧為治當權利害輕重理在人心隨寓而見卷十二人之才有幸有不幸聖人以無私而成其私先其大者則小者服天下之弊起於相仍不可以一節而棄士宰相得人則百官正因事而納君於善道事變常出於所不憂為天下者使後可繼卷十三善治者無赫赫之功天下之弊自上啟之人君求治不可太鋭從事其小而忘其大為治當先立其在我為治不可以有所懲臣等謹案八面鋒十三卷原本不著撰人名氏卷末有明𢎞治癸亥都穆跋謂宋時嘗有版刻第云永嘉先生攷陳傅良葉適當時皆稱永嘉先生相傳此為傅良所撰或曰葉氏為之今觀其間多傅良平日之語其為陳氏無疑云云案宋史本傳載傅良有詩解詁周禮説春秋傳左氏章指行于世獨不載此書其為果出傅良與否别無顯證然觀其第二卷中稱今之勸農不必責于江浙而當責于兩淮大江以北黄茅白葦薈蔚盈目又稱太上皇朝隅官為民害太上皇毅然罷之第三卷稱國朝熙寧中則固確然為南宋書其魯桓不作魯威犯欽宗諱魏徴不作魏證犯仁宗嫌名蓋明人重刋所改也其書凡提綱九十有三每綱又各有子目皆預擬程試答策之用非欲著書故不署名耳宋人好持議論亦一代之風尚而要其大㫖不失醇正永嘉之學倡自吕祖謙和以葉適及傅良遂于南宋諸儒别為一派朱子頗以涉于事功為疑然事功主于經世功利主于自私二者似一而實二聖人之道有體有用亦顧其事功何如未可以其末流遂全斥永嘉為俗學也是編雖科舉之書専言時務亦何嘗涉申韓商孔之術正可見其宗尚之未嘗不正矣乾隆四十三年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
