body:
  text: 八面鋒卷十三宋陳傅良撰善治者無赫赫之功勸農桑求實用去文飾戒好異談龍肝誇鳳髓足以駭人之聽矣至於濟飢則曾不如菽粟之有益也陳黼黻耀文繡足以駭人之目矣至於禦寒則曾不如布帛之有效也嘉唐虞而樂商周登泰山而禪梁父足以動人之觀聽矣至於論治則不如清淨淵默之有得也自昔聖人循循焉以忠厚化天下初無非常可喜之功而天下之人隂受其利而不自知後世好大喜功之主以為聖人之為不足使人聳動而傾聽於是變循循而為赫赫棄天下之所常行而駭斯人之所未嘗見奮乎百嵗寂寞無聞之中而欲逺過乎五帝三王之上頌聲滿天地貴名耀日月亦可謂一時之盛事矣噫夫名之盛實之衰也觀美之日隆而大本之日忘華藻之日益道德之日薄也天下有至當之理天下莫能非後世莫能議事已立而迹不見功已成而人不知安用使人喜談而樂道哉漢之文帝攘却不如武中興不如宣二十三年之間農桑之外無異説粟帛之外無竒貢嘗試取其紀而讀之崇力田之科下勸農之詔不若富民之有侯搜粟之有尉也胸奴三入而三拒之未嘗窮兵出塞不若登單于之臺封狼居之山也法令之茍且禮文之有闕不若改正朔而易服色興禮樂而修郊祀也宮室不增益帷帳無文繡不若建神明通天之臺而備千乘萬騎之駕泛沙棠木蘭之舟而設魚龍曼衍之戲也然而成敗異變功業相反者文帝富庶之效至於貫朽粟陳家給人足而武帝則海內虛耗矣文帝治安之效至於方內人寧靡有兵革而武帝則暴骨千里矣斷獄數百幾致刑措則與夫窮治刻骨者有間矣黎民醇厚重於犯法則與夫姦軌不勝者不侔矣夫文帝之治初若武帝之所不足為武帝之治終若文帝之所不能為而算計見效文帝之化可以幾三王而後世之言孝武者至以秦皇而匹之信哉彰彰之不如默默㗲㗲之不如循循至當之理無可喜之功而常行之事有必至之效也天下之弊自上啓之抑奔競奬亷退外任限年朝而趨市駢肩相摩莫而過市掉臂不顧非朝貪而莫亷也朝有所求莫無所求也一兔走野百人逐之積兔在市過而不顧非前爭而後遜也前則未定後則已定也切嘗因是而論天下之士其所以在上古而靜退在後世而奔競者豈性情之頓異也亦上古之爵祿不可求而後世之爵祿可求也上古之爵祿皆有定而後世之爵祿皆無定也唐虞三代之時禮樂修明風俗醇厚凡為士者三揖而進一辭而退禮如此其峻也三十而仕五十而爵進如此其迂也論定然後官任官然後爵仕如此其艱也不傳贄為臣不敢見於諸侯分如此其嚴也然處之甚安守之甚固無滯淹之嘆無僥幸之心是豈有法制以驅之乎亦曰上之人未嘗啓奔競之門而已蓋當是時持黜降以佐天子者以公道而立公朝以公心而臨公選材適當其位而無毫髮之浮位適當其材而無毫髮之過材之外無餘位位之外無餘材天下之士道德茍充爵祿自至初無求於上之人則巍巍廊廟殆為無求之地矣故巧者無所用其智貴者無所用其權詐者無所用其謀諂者無所用其佞於斯時也雖求奔競之名猶不可得况有所謂奔競之禁乎後世禮義廢風俗薄名器濫爵祿輕不使官求人而使人求官不使上求下而使下求上奔競風成莫之能禦權在於左右則為之掃門權在於嬖寵則為之控馬權在於妃主則為之邑司權在於貴戚則為之主事髙爵重祿如取如攜無不得其欲焉彼介然自守之士十年不之調者有之三世不徙官者有之利害之相形如此人安得而不奔競乎誘之於上而欲禁之於下誘之於此而欲禁之於彼是猶乞醯而却蚋聚羶而去蟻雖刀鋸日被亦有所不勝矣人君求治不可太鋭足國用裕民力革吏弊核軍實古之善為天下者未嘗為茍且之説速成之計以求治於朝夕也強力奮發以為之至誠無息以持之其初雖若迂濶而難就澶漫而難立而其終必將有所觀漢唐以來號為善治之君者漢一文帝唐一太宗竊觀文帝即位之初公私之情尤可哀痛矯偽告訐之風尚未知教賈誼上太息痛哭之書勸之紛更文帝則體吾之恭儉舒遲以待之寬厚以撫之而未暇於紛更也末年海內富庶興於禮義黎民醇厚幾致刑措者則文帝有以緩之也太宗即位之初關中旱蝗户口未盡復大亂之後難治盜賊未息封倫進刑名雜伯之説以求近效太宗則行吾之仁義持之不變為之益力而不求乎近效終於斗米三錢行不齎糧夜户不閉嵗斷死罪二十九則太宗有以緩之也蓋恭儉仁義乃其為治之地而行之以久者乃其所以致效若夫武帝則不然不施仁義而切切於慕唐虞其求治固甚鋭也公孫𢎞進期年尚遲之説以誘之而武帝之心益荒卒之海內虛耗悔無可及而唐虞之治益逺文宗則又不然不得治本而急急於致太平其責治何太早也李石進日久月長之説以堅之而帝之意已倦卒之開成之治日不逮前而太平之功益難吁朝為賈而夕冀巨萬之獲耕者未卒嵗而乃求箱倉之積為治不能遲之以嵗月而乃惑於茍且之説速成之計吾固知武帝文宗之治戞戞乎其無驗也昔有善陶者直必百金嘗苦其難信然其器終身而不隳鄰之陶者直才數金人之市者踵至然朝用而夕壞愚之所見得無類是乎從事其小而忘其大節用愛民用兵省官為國者不可從事於其小而忘其大者也天下之事小者固不可以不究心也然必究心於其大而後及其小則所行為得體拘拘於其小者而大者未嘗過而問吾恐其小者之所得不足以補其大者之所損矣民之生固不可傷也世之人君知民生之不可傷則不過重於刑而已至於窮兵黷武之事則快心為之而不恤是豈真能不傷民也耶國之用固不可以不節也世之人君知國用之所當節則不過儉於服色之末而已至於濫官冗兵之費則視以為常而不怪是豈真能不傷財也耶梁武帝號為恭儉一冠三載一衾三年食一瓜為十數種治一菜為十數味則帝非不儉也然廣造塔廟窮極土木吾恐武帝之儉儉於小者也此省費息民所以不能禁賀琛之言唐太宗以人命至重每決死囚則五覆奏下諸州則三覆奏太常不舉樂尚食徹酒肉則帝非不愛民也然頻嵗東征委民鋒鏑吾恐太宗之愛愛其小者也此無罪之士肝腦塗地所以不能已玄齡之諫昔者讀詩至於魏國風見其以葛屨而履霜以園桃而充殽其迫於貧瘠而安於儉陋也亦甚矣然考伐檀之詩則曰在位貪鄙無功而受祿夫國家之重費莫大於爵祿之及人今魏乃不節無功之祿而區區然計服食之末是其儉豈得為中禮耶詩人疾而刺之以為儉嗇褊急而附伐檀於魏國風之末其意深矣三年之服不能行而緦麻小功之喪則致其察放飯流啜不能知而齒決之禮則致其問漢武帝有意於慕古然唐虞畫衣冠而民不犯帝之所自知也而任用張趙窮治刻骨齊襄公復九世之讐帝一見之則快心胡越用師三十餘年豈非從事其小而忘其大乎為治當先立其在我厚風俗革士風裕民益户口暢武威用兵執疑似之謀以求治者必無一定之説懷遷就之心以致治者必無可致之功自中古以還欲治之主誰不欲措斯世於帝王之盛然每旰食而焦勞臨朝而太息切切焉憂治道之愈邈何也天下之事惟不可與泛然者言之也説固一定於此與泛然者言之則疑似足以惑人之聽治固可至於此而泛然者為之則遷就足以變人之心故夫人君之治天下則亦當先為之立其在我而已漢文帝恭儉之説是文帝在我者之先立也文帝惟立是説於胸中持之以不息安之以不變是故陳武建征伐之議害恭儉者也帝則曰念不到此也賈生陳改易之説疵恭儉者也帝則曰未遑也郡國有乘傳之姦而帝不問侯王有僣擬之罪而帝不誅治效益邈而帝之恭儉益固卒之海內富庶興於禮義則吾前日恭儉之致也由是觀之文帝之恭儉非泛然者唐太宗仁義之説是太宗在我者之先立也太宗惟立是説於胸中持之以不息安之以不變是故封倫進刑罰之説反仁義者也則卻之而不顧權萬紀獻言利之䇿敗仁義者也則斥之而不用術不以御臣下而待以誠法不以止盜而撫以仁治不加進而帝之仁義益力未幾外户不閉行旅不齎糧則吾前日仁義之致也太宗之仁義非泛然而無所就者也古之善致天下之治者其不敢以輕心處之而堅其在我以安其自成者蓋如此議論不出於己而出於人則沒世無成説道學不得於己而得於人則終身無特見謀畫不斷於己而斷於人則百計無成功天下之事固不可無所立於此也不立於己而信於人輕聽其説而嘗試之未有不敗事者嗟夫適千里者不先聚糧而假貸於塗之人治病不得其所當用之藥而百品皆試於徼幸一物之中天下固有是理哉漢初之治與民休息其言治者曰貴清淨及其弊而欲振之也則曰漢家自有制度而其佐治者則曰奉行故事是漢人之先立先定而逆為數十百年之計者也至其間條目類例不可預決隨治而隨新之以備漢之治者雖日計之不害也唐初之治曰行仁義其言治者曰帝王之道顧所行及其弊而欲振之也則曰剛明果決而其議於後者則曰先自治是唐人之先立先定而逆為數十百年之計者也至其間條目類例不可預決隨治而隨新之以備唐之治者雖日計之亦不害也大抵大而要者逆定於數十百年之上小而詳者毛舉於日月嵗時之漸正如髙帝之造國大計已定然後徐起而應百出之態如韓信耿弇之用兵先慮已決然後徐起而趨其倉卒之會雍案髙帝下恐漏光武二字髙帝吾亦欲東光武天下郡國如是韓信北舉燕趙耿弇北發漁陽為治不可以有所懲寬猛文質乏財用人天下之事不可以有所懲也有所懲則必有所偏故方其懲之也惟恐其弊之復見也懲之而至於偏則偏之弊生而無以異於其所懲者矣昔者周之衰也齊楚三晉之強綿地數千里外重內輕而王室遂不振秦人懲其弊也於是收天下而郡縣之墮名城銷鋒鏑聚天下之兵於咸陽以重其內而其弊也匹夫橫行而莫之禁郡縣之吏熟視而莫敢誰何而秦遂以不祀漢興又懲秦孤立之弊故封同姓以填天下大啓九國分王子弟而天子所有才十五郡當是時惟恐同姓之不蕃熾昌大也然未幾而七國生變幾於危漢之宗社文景武宣以來又懲之損抑諸侯減黜其官惟得衣食租稅不為士民所尊然中外殫敝本末俱弱而姦人無所忌憚而漢遂以亡凡天下之弊懲之則未嘗無所偏既偏矣則其害未嘗不甚於所懲惟治亦然西漢尚寬厚懲秦之暴虐也然寬厚不已其弊必至於軟熟委靡大盜移國而莫之抗東漢尚名節懲前日之委靡也然名節不已其弊遂至於矯激卓異而為黨錮之禍嗚呼事之不可有所懲也如此世之人主每不慮其所終不稽其所弊矯枉而過於正懲寬而至於嚴快意甘心卒以蹈其後日之悔其亦不思甚也夫天下之勢其狀如長江大河日夜推移相激而不知止而夫人又從而導之則天下之變吾固未知其所終也天下之亂未嘗不激於其所偏而報於其所矯也偏則矯矯則亂亂則其勢又不能以不偏是以天下之勢一軒一輊隨所矯枉而禍亂倚伏於其間反覆去來無有窮已如庸醫之用藥病在於熱則用極天下之寒劑以下之藥之寒為病也則復以金石酷烈之法以反之寒已而熱藥之病復作矣蓋不知和扁之術不弛藥以養疾亦不為過則以激疾使復其中和之常而已故夫備天下之理以措天下之事則平正而不偏矯枉而不失乎中懲亂而不急於治遵乎禮義之安而無反側蹈乎中庸之節而不作好惡夫是以天下之弊常若持衡而禍患泯於無形蓋惟知道之君子惟能識之履道之君子惟能通之而智察於一隅者禍每伏於所察權用於矯枉者亂每伏於所矯天下後世之所以多事而常有智權不足之歎夫豈知其所不足者非智權也哉懲羮者吹虀懲噎者廢食唐自興元反斾之後乞𥜗剔帶之事一懲則聚斂之科始亟而事始暴矣八面鋒一書宋嘗有板刻第云永嘉先生而不著其氏名考之宋陳傅良君舉葉適正則當時皆稱永嘉先生相傳此為君舉所撰或曰葉氏為之今觀其間多君舉平日之語其為陳氏無疑也山東僉憲袁公大倫嘗以監察御史出按吳中偶獲其本謂有益於場屋之士手授吳江令劉侯濟民侯俾儒士盧雍校其訛繆捐俸刻之宋南渡後經學之盛以永嘉為首穆每覽陳氏論議未嘗不嘆其髙妙以為文人之雄如是書者誠天下之竒寶學者誦習玩味挾之文戰所謂千萬人吾往孰敢犯其鋒邪穆辱袁公之知而侯為同年進士故識刻之嵗月以見是書之行袁公與侯之功也𢎞治癸亥七月十日吳人都穆記八面鋒卷十三
