body:
  text: 八面鋒卷八宋陳傅良撰用重刑者懼人之玩昔者觀書至於堯未始不惑之也共工之庸違知之矣而去之不以時四嶽舉鯀帝曰不可而四嶽猶曰試鯀堯聽之未害也鯀用而無成則四嶽之責也奚辭而堯不加夫知其庸違而縱之不若未知之猶憚也責之無辭而難之則是茍有辭者莫得而詰之也宜去弗去宜責弗責亦莫以厲天下者蓋嘗為之深思其故而後得其説矣天下之人不可輕以刑示之也彼其未見吾刑之初惟聞有所謂刑之名而未見其為刑之實故其心常凛然行乎不可測知之中及其既以刑而示之則向之所聞今其身履之矣彼將以為是亦無所可畏也於是乎玩心始生堯之不輕於用刑其亦懼人之見吾刑而有玩心乎蓋至於舜一旦取四凶而誅之刑雖不為過殺雖不為慘而天下之人始見刑矣夫民日之所聞至於是一日而見則已久矣雖殺猶將玩之况未至於殺乎其刑止於如此其罰止於如此吾既見之矣是不足多畏也故舜之後為商周商周之後為秦秦之後為漢刑罰愈嚴殺戮愈衆而民愈不知畏者其見之非一日也嗚呼嬰兒之在襁褓也一呵一叱而知懼其久也鞭朴日加焉而恬然懼心不生彼固知其止於如此也三代之後吾嘗有愛於漢文帝之治吳王不朝賜之几杖張武受賂賞以金錢深有得於堯不輕用刑之意夫不朝而賜之受賂而賞之宜若畏懦委靡而不足與有為矣而文帝之意則以為二人之罪固可罰也而吾之威不可輕以示人也不輕於示人而使之常不見吾所以為刑之實則天下之人未知吾君之刑何如而玩心不萌矣寬其刑於一人而去其玩於千萬人若文帝之術正堯之遺意也嗟夫淵壑之深望之黯然而不知其淺與深有一人焉探而涉之則必有一人焉從而繼之何也以其深淺之既知也不知則不敢繼矣法無善惡在人所用古語有之栁下惠見飴曰可以養老盜跖見飴曰可以黏牡飴一也而或以養老或以黏牡善惡唯其所用也宋人不龜手而洴澼絖吳人得其方而裂地封侯不龜手之藥一也而或以封侯或以洴澼絖小大唯其所用也法之在天下亦然常平之法古人用之便民後世則以是而取利薦舉之法古人以是而進善後世則以是而招權豈惟二者而已哉凡今之法亦莫不然曰銓選也堂除也法之見於吏者然也曰鄉兵也差役也法之見於民者然也學校貢舉之法見於士屯營府衛之法見於兵是數者法之孰為美孰為惡孰為小孰為大此惟人所用爾用之美則美用之惡則惡小用之則小大用之則大譬之雨露之在天梧桐得之以養其柯條荆棘得之以養其芒刺譬之財貨之在人賢者用之則養其身小人用之以喪其生豈有美惡大小之辨哉顧人不能無美惡小大之異耳昔蘇文忠公通守錢塘是時四方行青苗免役市易浙西兼行水利鹽法公於其間常因法以便民民賴以少安嗚呼以不便民之法而善用之者猶足以安民况於法之果便者乎夫子以詩禮為過庭之訓而或者用之以發蒙詩禮豈發蒙之資乎焦延壽専精於易而京房得之以殺身易豈殺身之具乎譬之於火用之㸑釡則為善用之燎原則為惡然曷嘗有二火哉譬之於水用之以溉田則善用之以灌城則為惡然曷嘗有二水哉行事雖同心術則異堯舜之遜遜也子噲之遜亦遜也夷齊之廉廉也仲子之廉亦廉也湯武之仁義仁義也而徐偃王宋襄公之仁義亦仁義也然堯舜之遜夷齊之廉湯武之仁義當時行之則見其利後世行之則大其美至於子噲之遜仲子之廉偃王宋襄公之仁義當時無所利後世亦無所美世豈固以成敗論人物耶是不然堯舜湯武之君夷齊之臣其心純於為道子噲仲子偃王襄公之徒其心純於為名為道則率性而安行至誠而不息為名則非出於其性非本於其誠勉強矯激苟可以得名而已是其行事雖同其用心則異矣故夫君子之論人要當觀其心術不當即其行事王衍之不言利與孟軻同桑𢎞羊之言利與劉晏同𢎞羊之均輸即太公九府之遺意才與法合不患其密賢良進士銓選引繩以正直曲欲去繩者必其不直也持鑑以照妍醜欲棄鑑者必其不妍也設法以舉賢俊欲廢法者必其不賢也何者直與繩合則不知有繩妍與鑑合則不知有鑑才與法合則亦不知有法愈密矣則使愈見其寬愈難矣則使愈見其易今世賢良之選欲試以竒篇奧帙而議者每懼賢良之沮格進士之舉欲試以經術詞章而議者每病進士之難兼吏部之銓量欲試以身言書判而議者每慮選舉之苛碎此愚所未喻也魯之儒者舉國哀公下令而儒服者一人切意其下令之初魯國皆懼而一人之真儒固自若也齊之吹竽三百人齊君好别吹之而東郭遁去切意其别吹之初東郭自懼而其餘之能吹者固自若也不以或然而廢常然理有常然而事有適然因適然之事而疑當然之理智者不由也歷數天下之事出於常然者十之九出於適然者百之一以一廢百奚可哉四凶之姦天下之大惡也舜不以四凶之惡而不舉元凱者以四凶為適然也管蔡之罪天下之大變也周公不以管蔡之變而不封懿親者以管蔡為適然也苟持不必然之事而奪必然之理則物物可畏人人可防其心焦然無須臾寧矣君人者固有常體操至公以格天下合此者升戾此者黜向此者擢犯此者刑初未嘗容心於其間故有譴怒而無猜嫌有疏斥而無疑二上無永廢之人下無自絶之志此固君人者之常體也昔者嘗怪西漢七國之變而擯斥同姓作左官之律設附益之法惟得衣食租稅不為士民所尊則是以七國之適然而廢親親之常然也光武以新室之禍而不假宰相以權以吏事責三公而以司𨽻校尉督察之則是以新室之適然而廢公卿之常然也唐德宗時張涉以儒學入侍薛雍以文雅登朝繼以贓敗而帝心始疑不復倚仗文臣則是以二儒之適然而廢用儒之常然也蓋世有耕田而以其耜殺人者或者以為耕田之可廢夫殺人之可誅與耕田之不可廢此二事也安得以彼而廢此哉事有出於法度之外用兵作文論天下之事出於法度之外者有三一曰氣二曰意三曰心祖龍之師併六強國項羽之兵破五諸侯者氣也和緩之醫不論老少曹吳之畫不擇人物者意也郢人之斤運若成風梓慶之鐻見猶鬼神者心也善念無力則為惡勝楚之共王有疾召令尹曰常侍管蘇與我處常忠我以道正我以義吾與處不安也魯隱公矢魚于棠臧僖伯諫之不從及其卒也則曰叔父有憾於寡人寡人弗敢忘葬之加一等夫共王既愛管蘇之道義是固知其為賢者矣而反不安之何也隱公既以厚葬報僖伯是固知其忠諌矣而反不從之何也蓋人君當使氣聽命於心不當使心聽命於氣氣聽命於心則心有所為氣不得而遏之心聽命於氣則氣有所向心亦不得而禁之人君豈不樂安存而惡危亡好理義而恥過失惟其一心之力不能以御氣之悍故心知其為善矣而制於氣而不能行心見其為賢矣而制於氣而不得用嗟夫此漢武帝唐明皇之所以不克其終也畫衣冠異章服而民不犯是言也實出於武帝之口則帝非不知刑之所不當用也而罔密文峻窮治刻骨愚以為此非武帝之心武帝之氣使然也韓休敷陳治道多訐直我退而思天下寢必安是言也實出於明皇之口則帝非不知休之為賢也而不終嵗而逐之至於知林甫之妬賢疾能則相之終其身愚以為此非明皇之心明皇之氣使然也心勝氣則心為主氣勝心則氣為主此二君之天資卓絶豈有明知其不善而犯之蓋其善念無力而惡念為之日勝故其心有不能以自立也然則如之何曰大人君子苟能於此進格心之説使之以志御氣以禮制欲以道勝情涵養既久鍛鍊既熟則尊所聞行所知庶幾可以次舉矣不以小節傷國紀綱昔者嘗觀漢文帝即位之初朝而問宰相勃曰天下一嵗決獄幾何勃謝不知也天下錢穀一嵗出入幾何勃又謝不知也以問丞相平平曰各有主者即問決獄責廷尉問錢穀責治粟內史文帝稱善勃竟慚而免相愚讀史至此切知文帝之用人未嘗不謹於能否之辨及觀張釋之傳上登虎圈問上林尉禽獸簿十餘問尉左右視不能對虎圈嗇夫從旁代對甚悉文帝欲拜嗇夫為上林令以釋之一言而遽止夫上林尉之不能對與周勃之不能對一也虎圈嗇夫之能對與陳平之能對亦一也今也周勃以不能對而見罷而上林尉無所責陳平以能對而見稱而嗇夫無所賞豈文帝至此而誤耶蓋嘗為之深思其故而後得其説夫人主之有為於天下其紀綱不可不存也紀綱之所繫雖一階一級之若可輕竒材異能之若可喜吾不以其所輕者而畀其可喜以其所輕而畀其所喜其始雖若未甚害至於考其所終稽其所弊則下者爭圗其上言者競出於其位而紀綱之始大壞也彼決獄錢穀之數一相知之一相不知之則去一而取一誠未害也若夫上林尉之不能對而嗇夫越職而對文帝亦越而遷之則凡有材者思奮其材辨者思逞其辨卑者欲踰尊疏者欲踰戚所謂圖上出位之風始不可遏矣故吾寧屈天下之材而不敢不存國家之紀綱元成以來雖無足道然猶能世守漢之家法方元帝時華隂守丞上封事薦朱雲為御史大夫朱雲之忠誠可以大用也然一守丞之微非可以薦御史大夫者下輕其上爵賤人圖柄臣則大綱小紀之所在必於此而壞矣匡衡所謂欲以匹夫徒步之人而超九卿之右非可以重國家而尊社稷其知紀綱之説歟其得釋之之遺意歟士量力而趨於其事天下之患每大於不量其學力之所至而妄施之夫使之皆得量其力之所至而無過於其望則疑忌怠惰而無志孰知夫天下之事其為之蹇淺而無成致之疏魯而多敗者其患又自夫不量力者來歟管仲之相齊固知力之可以周旋於齊也過此者吾力之所不及也彼其縱聲色逸子女世皆譏之而不知非仲力之所多也子産之相鄭也固知吾力可以從容於鄭也過此者吾之所不能辦也彼其鑄刑書不能定遷世皆譏之而不知非産力之所及也夫使去聲色撤子女而又能不以邪而間賢與不為刑辟能定遷而又能措國於無事夫豈不善則亦先王之政也二子其難之獨何歟夫固曰量力而動其過鮮矣學不足以克之而強揠之以就事吁其危哉古之君子其以志而加諸事以身而任諸人所以為而成動而功而無曠敗不滿之處者惟其度吾力之所至而計其後之所成而後為之則為之時與成之日皆可以遂逆知其所為而無後悔無李廣之才則省文書擊刁斗莫若為程不識無孔門高弟之才則學詩學禮莫若為伯魚烏獲之力弛而不用遇盜而三揖之則盜知服矣無烏獲之力遇盜而揖則死矣不可為而為之則凶量力緘默苟且畏名逺嫌人皆曰士君子立人之朝有犯無隱緘其謀而不泄遁其才而不耀避世者之為也而謂人臣可以為乎哉嗟夫人臣固不可以為此也然而事固有不可得而為者冒而為之則亦自禍而已故夫天下之患莫大於不可為而為可為而不為者次也昔霍將軍用事田千秋為丞相事事決於光光為言千秋曰唯將軍留意即天下幸甚終不肯有所為宣帝躬親萬幾張安世為大司馬車騎將軍領尚書幕府長史有譏其不進士者安世曰明主在上賢不肖較然臣下自修而已何知士之進耶且千秋豈不知事者安世亦豈不樂收進賢之美譽也哉蓋分霍光之權以逞其才者爭之端而嫌隙之所以開犯宣帝之所忌吾見其身之殆而無益於國也在易之坤六四曰括囊無咎無譽象曰括囊無咎謹不害也當霍光宣帝之時二子而不括囊其不危哉八面鋒卷八
