body:
  text: 八面鋒卷六宋陳傅良撰事要其終知人用心天下之事要其終而後可以知人之用心恩之已甚者未必非以殺之而忍於抑其所愛者未必非以全之也茍不於其終焉而觀之則恩者人以為真恩忍者人以為真忍蓋至於此則是非之在天下始為之失其實矣嬰兒之甚其飽貴人之極其寵而嬰兒之病貴人之禍則生於飽之寵之之日也嚴師之笞楚慈母之呵叱而子弟之成就則在於笞楚呵叱之時也孰謂人君之於天下恩可遽指以為恩威可遽指以為威哉昔者綘侯親握天子璽而授之文帝一日有疑下之獄吏幾死而僅免則文帝疑若少恩矣孰知文帝之少恩乃所以抑去其驕蹇之意而務以全其宗也宣帝之於霍氏厚之以權不約之以禮使其不肖之子姪且假之以當路之權柄則宣帝之於霍光其厚之亦至矣不知夫厚之者乃所以速其逆節之露也人主之恩威未定大率類此管仲侈淫田氏儉約鄭莊公叔假事曹參飲醇酒事陳平從吕后王諸吕議論不一理未嘗異至真無二至公不殊言語議論不一而方之於笑哭則天下無異聲貴賤賢愚有異而較之於生死則天下無殊塗理之在天下亦若是而已矣彼謂夫議論之間未嘗紛亂而不可誣是以聖人在上衆正路開人人得以自盡不有得於此則有得於彼其初雜然而不可聽然其論利害也詳言是非也明吾惟審擇而謹取之耳又何病夫議論之不一也世之談者類曰謀夫孔多是用不集言之多徒以敗事也外廷百口徒亂人意言之多徒以惑人也不知夫所以惑所以敗者不在於言之之多而在於擇之之不審使有堯舜禹湯文武之君在上於衆言不一之中必有卓然不惑之見其言愈多其理愈明其見愈審又豈至於多而惑惑而敗也哉聞仁宗朝杜祁公衍范文正公仲淹韓魏公琦富鄭公弼歐陽公修余靖蔡襄之徒相繼在列每朝廷有大事議論紛然纍日而不決司馬君實與范景仁號為至相得者鍾律一事亦論難數日而不厭夫其所謂纍日而不決數日而不厭者當時亦曷嘗病其惑人而敗事也哉以至一之理而為是不一之議論言者不止而聽者不厭則亦以吾胸中自有卓然之見而夫人之所欲言不得不使之自盡也法廢則人得肆其情吏部資格子貢欲去告朔之餼羊孔子以為不可齊宣王欲毁明堂孟子以為不可夫具餼羊而不存夫禮則不如無餼羊有明堂而不知其政則不如無明堂古之人何眷眷於此而獨以為不可耶豫嘗論之曰彼其不知其禮其政然猶有先王之物存焉則肆其情者猶將有所礙也茍取餼羊而去之取明堂而毁之其所以礙人之情者既不復存則蕩然無所限制縱意肆欲將何所顧忌耶今夫法之設以迹絶私也事私行於無形而人莫得見其情故聖人設法以為寓公之具寓公者有具則戾公者有形矣春秋之世諸侯相與削去周書之籍夫何讎而為此直惡夫行私之有形耳後之君子不知夫法可以礙行私者之情以為任法不若任人於是取天下之法而罷之為用刑之説則曰無為刑辟議事以制可也為用人之説則曰毋拘定制見賢而用可也夫使朝廷常清明大官常得人則法之所在循之可也立之亦可也不幸而有縱情以行私者出焉前無所顧後無所忌喜怒豫奪惟我所欲則典刑之壞必於是焉始矣蓋昔者裴光庭之設循資格而張九齡極論其弊及其為相一切罷之其意蓋以奬拔人才激厲士氣且使不得執法以徼其上而權之出於朝廷也吁孰知是法之廢而朝廷始無所守蕩然得以肆其情耶嘗觀明皇開元之初資格未廢之際以蘇廷碩之能明皇欲大用必問宰相有自工部侍郎而拜中書其果宜乎宰相以為惟賢是用何資之計明皇乃敢從之李元紘之才公卿交薦籍甚明皇欲自天官侍郎擢拜尚書斯未為驟進也然宰相以其資薄止拜侍郎夫以蘇廷碩李元紘卒為宰相雖使當時擢自衆人以管機政未為過也又况一自工部而拜中書一自侍郎而拜尚書非躐等也然必問大臣許而後授之不許則不敢也蓋其法度人臣惓惓在於資格而不敢忽也及其惑林甫之姦欲相牛仙客則自河湟使典擢班尚書遂不復計資而九齡雖惓惓盡忠援故事而且不聽矣明皇即政之初其資格雖毫釐必計而其終也雖尊卑疏戚顛倒易置而有所不恤豈非資格盡廢彼固得以肆其情而無所礙耶本朝李定以資淺入臺事最細也若未害治也而宋敏求不奉詔蘇頌又不奉詔夫亦審諸此而已耳用人以資則盛德尊行魁奇俊偉之士或拘格而遲回焉張釋之十年不得調揚子雲官不過執戟是也任用不可使人取必資格聖人之於天下惟其我既取必於人而人不能取必於我夫是以天下惟聖人之為聽何者我取必於人則權在我人取必於我則權在人人不敢為而奔走天下者權也以奔走天下之具而委之於人則欲富者富欲貴者貴如執劵取償其勢不得不應其勢既應之則在我之富貴有限而彼之欲無窮置而不問則怫然有所不平於其心夫聖人者不牽於天下之私情而務合於天下之公議必其有可以得富貴之理然後遺之以富貴之資故得之則釋然有以自慰而不得者亦慊然有以自愧昔者嘗讀西漢百官表見武帝之用人廢置豫奪何其雜然出於不然必然之不可測也張歐為中廷九年而遷而王溫舒之遷五年韓安國之遷一年商丘成為大鴻臚十二年而遷而田千秋之遷一年田廣明之遷五年是則武帝之用人有不可以遲速推西漢宰相之缺則取之三公三公之缺則取之九卿然而石慶之死御史大夫兒寬當遷而不遷而太僕公孫賀得之公孫之死御史大夫商丘成當遷而不遷而涿郡太守劉屈氂得之御史大夫延廣之罷九卿當遷者甚衆夫何取諸濟南之王卿御史大夫公孫𢎞之罷九卿當遷者甚衆夫何取諸河東之畨係是則武帝之用人有不可以次第度彼武帝以為吾之爵祿而使天下得以意度而情窺之則吾爵祿之權將折而歸於下是故示之以為天下之端而引之以不可窮之緒使天下惟知愛之而為之之力終莫能以歆羡邀持於其間此固帝之所為雄材大略也則天下之人何其可以馴致而必得也定日月以為遷就之期蓋將以沮躁進者之心也循資格以為進擢之階蓋將以杜僥幸者之路也此二者則甚公矣然愚之所慮者士大夫取必於朝廷之爵祿而朝廷又自開其取必之門也漢宣帝之役用人材其規矩法度凛然有武帝之餘風九卿之秩視郡守則九卿崇矣而當時乃有自少府而為馮翊者郡守之職視三公則郡守卑矣而當時乃有自潁川而入為宰相者朱邑之治行第一視黃霸無愧也而其官則止於大司農王成之偽自增加視趙蓋韓楊有餘罪也而其爵則至於關內侯逆耳之言不可不聽聽諫人主之尊天也其威雷霆也人臣自非忘軀徇國奮不顧私者誰肯抗天之尊觸雷霆之威以自取戮辱也哉故自昔人臣類皆覘主意之所在奉迎投合惟恐其或後以失為得以非為是者人人然也昔梅福言於成帝曰自陽朔以來天下以言為諱羣臣皆承順上旨莫有執正取民所上書陛下之所善試下之廷尉廷尉必曰非所宜言大不敬魏明帝時侍中劉曄為帝所親重或謂帝曰曄善伺上意所趨而合之陛下試舉所向之意而問之必無所復逃矣帝如言以驗之果然後不復敢在羣下默視而疾趨如此至於犯顔而諫苦口而諍豈人臣之所樂哉非其所樂而奮然為之是必有夫不顧私者而奪之也而人主於此顧方痛抑而深沮怒之未足而繼之以斥斥之未足而繼之以誅士亦何望而不為諂諛佞媚以自取踈外也哉且漢髙帝之創業光武之中興當時言聽計從無以齟齬宜不復有阿容而不盡巳意者然詔羣臣擇有功者以為燕王羣臣知上欲王盧綰皆言太尉長安侯盧綰功多可立光武大會羣下問誰可傅太子者羣臣承望上意皆言太子舅隂興可附會投合卒無一人異辭彼二君好賢樂諫如此之切而當時猶有承意順志逢迎阿附之風况夫斥之誅之而使之不敢言耶故愚以為朝廷之上幸而有方正之人節義敢言之士人主正當鑒自古人臣希合之弊而為優容奬借以作天下忠直之氣就使其言時有不中於理猶當和顏開納以屈於天下之公論人心之所同是者惡可以却而不聽也哉為治不可以圖美名人主之有為於天下者不可誘於古人之美名而忘今日之大勢也夫誘於古人之美名而忘今日之大勢則其施設措置必有齟齬而不順其所為者矣是故蘇威作五教以齊民其意以為有虞之治順其勢而民以大謹太宗欲襲封刺史亦庶幾於三代之所為然而功臣不樂名則美矣而勢有所不順也後周以來至於南北之際而不免於亂亡房琯效車戰於陳濤之役而卒以取敗名亦美矣而勢有所不順也勢之所在上古之禮樂不用於後世商周之質文不襲於虞夏其初非聖人制之耶而後之聖人革之不以為嫌夫亦順其勢而已矣周公之井田歷三代而後備至良法也而齊侯變之為內政內政之兵非不強也而太宗乃近取周隋之制葺而為府兵太宗亦豈不能復古哉自桓公不能從井田之制太宗不能從內政之法夫亦順其勢而已矣不順其勢而徒誘於其美名是猶以鄉飲酒之禮而理亂秦之市干戚之舞而解平城之圍不可得也故夫人主之為治於名有所不敢誘於勢有所不敢違按今之法而為之地雖若近於循常蹇淺終不屑於愛古之美名而自貽今日之實患蓋其所以深思熟計而權事理之輕重者胸中素見已定矣逆時乖數之事終有所不為也昔者嘗疑漢文帝之不興禮樂宣帝之不用周政以為二君者不能為經久之慮以還三代之治於漢及考文帝之時而後知其勢之所在惟在於清淨玄默以與斯民息肩於瘡痍凋瘵之際則禮樂制度誠有所未可興也考宣帝之時而後知其勢之所在惟在於剛明果斷以起天下委靡偷懦不立之氣是以雖美名亦有所不可用也二君之所為可謂得當時之宜而不為古人之誘矣去夫積弊當以其漸人常言亟解紛者益其紛縱理御者固其御遏河之奔者必恣其奔息人之怒者必飽其怒去天下之弊亦若是而已矣隂解其亂而徐去其弊則悠然日趨於平安而不自知奮然而擊去之而求以稱快乎吾意則其害始大橫流潰決而有不可收拾者矣雖然是特一時之害耳至於積弊之所在其成也非一日其積也非一世源深流長有不可以旦夕遏者是又惡可以不勝其忿而奮然為是僥幸速成之計耶周自平王東遷王室既卑矣桓王憤諸侯之不朝一旦連三國之兵而伐鄭以自取中肩之辱而益成諸侯之強則實一鋭不忍為之也魯之政在於三家久矣昭公不能去之以漸不忍一朝之忿而求逞夫私欲而禍卒以自及蓋魯之所以失無以異於周也在易屯之九五曰屯其膏小貞吉大貞凶九五以君位之尊居屯難之世威權不行膏澤不下故曰屯其膏漸正之則吉驟正之則凶聖人垂戒之意深矣故夫人君將去天下之積弊要當以周魯之事為鑒以易之辭為法昔者漢七國之治非可以旦夕而裁削之也鼂錯不忍數年舒服浮躁躑躅亟下削地之詔遂激其反唐藩鎮之悍非可以旦夕而翦鋤之也德宗不能為歲月之逺慮不勝其忿鋭於遣三將而一伐遽起涇原之變在易需之九五曰需于酒食貞吉乾上坎下是乾之剛健遇險而未能進故需須也今九五居至尊之位而息于險難故曰需于酒食宴樂雍容之象也言人君處險難之際正宜寬以待之不當以驚憂自沮唐文宗當積弊之後每朝羣臣則泣下沾襟魂飛氣索此不知酒食之義也自武而成自成而康歷三世而商人利口靡靡之俗未殄自髙而惠自惠而文歷三世而秦人借鋤誶語之俗猶存八面鋒卷六
