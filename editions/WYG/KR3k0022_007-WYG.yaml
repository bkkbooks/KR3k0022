body:
  text: 八面鋒卷七宋陳傅良撰不可以疑心聴人言天下之物不可以疑心觀之也萬物錯陳於吾前鳬短鶴長繩直鉤曲堯仁桀暴夷廉跖貪區别彚分本無可惑疑心一加則視鳬如鶴視繩如鉤視堯如桀視夷如跖此非物之罪也以疑先物所見固非其正也内疑未解外觀必蔽豈特物而已哉惟人之聴言亦然執桀跖之轡而譽桀跖出申韓之門而譽申韓則人孰信其譽以鄉原而毁伯夷之廉以里婦而毁西子之美則人孰信其毁何者彼其所言之人吾固以惑心聴之也宋昭公去群公子而樂豫以公子而争之豫之言雖是而昭公固以為己疑之也樓緩從秦至趙而請與秦地緩之言雖當而趙固至計無自而入矣由是觀之則凡言有出於公而渉於私者固人主之所疑而君子之所無以自明也昔者西漢之世儒術之不振任子之不減外戚之不抑是三者之弊其是非可否瞭然而甚易知也然趙綰王臧言儒術而竇太后不從者趙綰王臧則身為儒者也王吉請削任子令而宣帝不從者王吉則以明經進也劉向排外戚而成帝不從者劉向則宗室之老也三君子之言不見用豈非漢之人主皆以疑心待之乎公父文伯之死女子為自殺於房中者二人其母聞之不肯哭也其相室者曰焉有子死而不哭者乎其母曰昔吾有斯子也吾将以為賢也今及其死也朋友諸臣未有出涕者斯人也必多曠於禮孔子曰知禮矣夫母賢母也孔子聖人也逐於魯而是人不隨也今死而婦人為自殺者二人若是者必其於長者薄而於婦人厚也雖然是言也母言之則為賢母使妻言之是必不免於妬婦矣三君子之言所謂以妻言之者也漢之人主之疑所謂以妻疑之也雖然君子之事君也惟用其情而已執論以逃嫌隠辭以逺謗皆不情也不情以釣其名而謂君子為之乎是故出於公雖不免於私君子亦力言之民心難以小恵劫之嘗觀孟子之言至於鄒與魯鬨有司死焉而民莫之救孟子以為凶年不發倉廪以賑之而不可以尤民至梁恵王移粟於民而孟子又以為非先王之政夫飢而弗恤穆公固有愧也飢而恤之恵王猶無取何也天下之事安於莫之為者誠非也迫而為之而不及其本者亦非也是故以梁之政視鄒之政梁若可喜以先王之政責梁之及民則末矣聖人之仁其積之有源其發之有機其所以愛天下者無窮而見於恤天下者則特其有限者也天下之人不以其有限之施而致不足之望而常以是信其窮之屯而懐不盡之感者葢於其所發占其所積聖人之心始形見於此夫其形見在於一日而天下之吾戴者則非其形見之日也魯侯弗奪於衣食而必以分人曹劌曰小恵未徧民弗從也子産以乗輿濟人於溱洧孟子以為恵而不知為政夫衣食之利私也而魯侯子産割以與之豈不為美哉而曹劌孟子不之信何也其大者不立則小者吾固知其不足以動人也人主當固結人心昔楚子伐蕭師人多寒王廵三軍拊而勉之三軍之士皆如挾纊徳宗在奉天帝遣人諜賊寒而請袴求不能得憫然而遣之士亦竟為之用夫二君於艱難之中而用人不能以實恵及之而徒空言悦之人亦不得其實恵而感悦其空言此其故何也人之情得百金之恵於其已敵而不以為重而王公大人下一語接之則詫然以為已榮葢凡出於意之所不期而分之所不及者為能動人彼其軍旅之賤而得拊勞之勤固已不啻純綿之温而奔走之卒領吾君憫黙之意亦已踰於吾袴之賜人主之於天下又焉用汲汲於財而後可以用為哉艱難多事之時一言足以感動人心而固結之况天下無事之際茍能愛養存恤撫之以徳發之以政輔之以仁則天下之所以感吾君者宜如何也故其國非山河之固而不可破非甲兵之守而不可攻則人心之固結而已物以順至當以逆觀聴言畏賢察佞物之以順至者必當以逆觀天下之禍不生於逆而生於順劔楯戈㦸未必能敗敵而金繒玉帛每足以滅人之國霜雪霾霧未必能生疾而聲色游畋每足以殞人之軀乆矣夫順之生禍也物方順吾意而吾又以順觀之則見其甘而不見其毒見其吉而不見其凶溺心縱欲葢有陷於死亡而不悟者人之有為於天下葢不可以不知此夫小人之得君也将欲移其權柄而迷其耳目則有聲色貨利以啗之甘言巽語以順之射獵歌舞以娯之迎其好而逢其欲覘其所向而俟其所歸有可愛也則徇之以為歡有可懼也則寢之以為安其意凡此者皆所以眷其君而蠱其心術也而人君不能以逆觀之而樂其順矣豢於其説而穽於其術中而莫之辯夫是以姦欺之患生不幾於危亡則不悔若夫忠臣義士則不然識高而見殊慮逺而憂大射獵歌舞之娯則禁而抑之聲色貨利之欲則諫而止之宵旰之勤吐哺之疲非人之所願為者則顧從而強之其説雖逆其理實順人君有能以順而觀今之逆以逆而觀前之順則天下可以常治而無亂矣昔者楚共王有疾召令尹曰申侯伯與吾處常縱恣吾吾所樂者勸吾為之吾所好者先吾服之吾與處歡樂之不見戚戚也雖然吾終無得唐明皇謂左右曰蕭嵩每啓事必順㫖我退而思天下不安寝夫共王之所謂吾終無得明皇之所謂我不安寝其能以逆而觀順者歟襄二十三年孟孫惡臧孫季孫愛之孟孫卒臧孫入哭甚哀其御曰孟孫之惡子也而哀如是季孫若死其若之何臧孫曰季孫之愛我疾疢也孟孫之惡我藥石也美疢不如惡石夫石猶生我疢之美其毒滋多孟孫死吾亡無日矣諫因其明處乃能入人臣進忠於其君必因其所明而後能入也人心有所蔽有所通其蔽者其闇也其通者其明也因其明處而告求信則易矣自古能諫其君未有不因其所明者也故訐直强勁者率多取忤其温厚明辯者其説易行古之人有行之者左師觸龍之於趙子房之於漢是也高祖愛戚姬將易太子是其所蔽也群臣争之者衆矣嫡庶之義長幼之序非不明也如其蔽而不察何四老人者高祖素知其賢而重之此其不蔽之明心故因其所明而及其事則悟之如反掌且四老人之力孰與張良群公卿及天下之心其言之切孰與周昌叔孫通然而不從彼而從此者由攻其蔽與就其明之異耳趙后愛其少子長安君不使質於齊此其蔽於私愛也大臣諫之雖强既曰蔽矣其能聴乎愛其子而使之富貴長乆者其心之所明也故左師觸龍因其明白導之以長乆之計故其聴也如響在易坎之六四曰納約自牖約所以進結其君之道也自牖因其明也二子之言其知坎之六四歟救弊毋為目前之計人有居於河瀕者一旦水至徬徨四顧莫知所為於是毁室徙薪四塞之有家人失火者倉皇卒迫乃舉其所有之金帛器皿投之烈焰而擈之然是人也能解目前焚溺之患而退有失所焚溺之憂前患方去而後患繼生則以其所一時苟且不思而為目前之計故也弊之在天下固不可以不救也然吾觀自古君臣之救弊徃徃舊弊未除新弊復作者無乃蹈於焚溺之失乎趙廣漢之治潁川也惡其俗之朋設缿筩以招訐訟行詭譎以起怨讎務使其民為不朋而已不知朋黨之禍去而告訐之禍復生也唐明皇之討安史也知天子之兵弱而不能制於是倚功於節度結援於囘紇之禍復作也汲汲於救一時之弊而不為安全經乆之計禍患之相仍吾亦不知其所終矣雍案回紇下有闕文天下之事不能兩全天下之事不能兩全也仰觀乎天夏澇而秋旱俯察乎地丘夷而淵實在天地猶不能兩全其所不可全之利而况於人乎生我所欲也義亦我所欲也故欲生而毋望乎義欲義而毋愛其生二者不可以兼全也為富不仁矣為仁不富矣故欲富則不必言仁欲仁則不必言富兩者不能以俱大也事之不能以兩全類皆如此昔者嘗怪宋襄公泓之戰而欲不重傷子魚曰君未知戰今之勍者皆吾敵也明耻教戰求殺敵也傷未及死如何勿重若惡重傷則如勿傷夫既欲殺敵又欲不重傷是襄公欲全其不可全也邾文公卜遷於繹史曰利於民不利於君公曰茍利於民孤之願也天生民而立之君以利民也民茍利矣遷也夫既欲利民又欲利君是邾人欲全其所不可全也是以賢君之有為於天下將以便民則不敢求以便已將以裕民則不敢求以裕國以已與國固可後也勢有所不能全也哺一雀而十蟲損愛一牛而一羊死既欲便民乂欲便己既欲裕民又欲裕國雖聖人有不能矣鄧攸舍己之子而負弟之子以趨葢弟之子欲全則己之子不可不舍也屈突通攻王世充而不顧二子之死葢己欲徇其公則不可復顧其私也燕昭王愛樂毅而斬其淫者令其心則小有所不足愛也唐明皇謂已雖瘠天下必肥利於民則己有所不求便也利在一時害在萬世常平方漢宣帝時大司農耿壽昌奏立常平法糴三輔近郡粟以給京師嵗省關東漕六十三萬人又曰令邊郡皆築倉以糓賤時増價而糴貴則減價而糶當時民皆便之壽昌至爵為通侯而蕭望之乃非之元帝時在位諸儒又非之併與鹽鐵願罷以為毋與民争利元帝亦聴用其説終漢之世不行一常平也壽昌既以便民而望之諸儒乃以為與民争利愚於此未嘗不竊疑之及為之反復其故而叅之以當世之變然後始知望之諸儒之議未為迂闊而不切事功者葢君子之於天下法必慮其所終行必稽其所弊事固有利在一時而害在萬世者彼常平之法大抵利於豐稔而不便於荒歉之嵗而神爵五鳳間糓石五錢縣官常増價而糴之豈不便於民及元帝即位糓石乃至三百餘豐凶之不常如此而官吏奉行所謂増價損價安保其必如壽昌乎禹貢之法在禹行之則善其後也莫不善於貢矣葢禹雖立為九等然有所謂錯出者故能無害後世執之以為常不復知所除則其病民為始甚今使縣官與民為市儻非賢官吏大率皆知責其所入之多所給之直未暇問也就使増價而糴亦有其名耳給直不時使民訴而得之徃徃費一而得二所増何補望之之説曰築倉治船費直二萬萬餘有動衆之功恐生旱氣民被其災望之之非壽昌不在是也曰壽昌習於商功分銖之事其深計逺慮誠非足任愚獨謂此語最為得之側聞國朝熙寜中司馬温公論青苗之弊因曰太宗皇帝平河東立和糴法是時斗米十餘錢草束八錢民樂與官為市後物貴而和糴不解遂為河東之患臣恐異日之青苗猶河東之和糴也望之之意得無與温公類乎致治非難保治為難天下非未治之可畏已治之可畏也非未安之可憂巳安之可憂也方天下之未治未安為士者相與講治安之術而為學為公卿大夫者相與進治安之術而為忠為人主者則又日夜求治安之䇿而為政上之所以焦心勞思下之所以進計獻議無非治安之是圖也故天下非未治之可畏非未安之可憂也天下治矣而可畏始生天下安矣而可憂始生士不知講治安之䇿公卿大夫不知進治安之忠人主又不知求治安之政上下相從於逸樂中外相忘於閒暇治不知所以保其治安不知所以固其安天下之治安始有不足恃者矣愚不暇逺引旁取姑取春秋齊桓公之事以言之齊侯自荘公十三年北杏之㑹至僖九年㑹于葵丘衣裳之㑹凡十有一也自僖八年洮之㑹至十六年㑹于淮兵車之會凡四也齊侯圖伯之心亦勤矣然方召陵之師未舉也貫澤之㑹齊侯不以伯主之尊而與江黄之㣲者盟其汲汲於伯功之成何如也及其召陵之師既舉而齊侯向日之心始荒矣陳大夫一謀不協其身見執其國見伐黄人被兵守城更歴三時告命已至而援師不出意驕於葵丘之盟禮失於陽穀之會狄入王畿而不能伐大夫救徐而諸侯不行是以狄人窺伺中國今年侵衛明年侵鄭淮夷亦敢於病杞而不忌聖人謹而書之以誌其侈心之動而伯業之始衰也故嘗以謂齊之伯成於召陵而亦敗於召陵使桓公返自召陵之後而不忘前日貫澤之㑹則夷狄之畏服而中國之尊安寜有既乎以桓公之事而論今日之事愚是以知未治未安之不足憂已治己安之為可憂也八面鋒卷七
