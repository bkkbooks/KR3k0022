body:
  text: 八面鋒卷四宋陳傅良撰天下之名生於不足儒林循吏獨行逸民忠孝舉國皆儒則儒者之名不聞為吏皆循則循吏之名不聞士皆純徳野無遺賢則獨行逸民之名不聞為子皆孝為臣皆忠則忠臣孝子之名不聞葢嘗讀渾渾之書而得九官十二牧之為人讀灝灝之書而得伊尹伊陟傅説之為人讀噩噩之書而得周召閎夭之徒之為人彼皆大儒也當時不稱其為儒者皆能致循良之吏也當時不目之曰循吏彼皆為忠為孝也當時不指之為忠臣孝子下至於鄉黨庠序之間不聞其有獨行山林草澤之間不聞其有逸民自晉國之人以儒稱則儒道衰於周矣自鄭子産楚孫叔敖以循吏聞則吏治衰於列國矣自伯夷栁下惠以獨行著則天下之事始有尚偏之弊矣自長沮桀溺之徒以逸民而長徃則韜光鏟彩於漁樵間者多逸民矣自子胥以忠稱於呉曾參以孝稱於魯則忠臣孝子稀踈寥落如參辰相望矣嗚呼士以一行得名於時彼亦何等時耶是故西漢之有儒林有循吏非西漢之美事也東漢之有獨行有逸民非東漢之美事也李唐之有孝友有忠義非李唐之美事也實泯於有餘名生於不足而已正雅之詩其序不言美極盛之卦其爻不言吉是二者文雖不同而意出於一何也天下之事名生於不足徳泯於有餘方其美惡之相形善否之相傾故天下之人得以窺其跡而議其事大人君子處於純全至正之地其不言之妙不言之神足以感動萬世皥乎其不可知者天下之人雖欲指而名之頌而美之豈可得哉詩之所述一介莫不稱美而成王之雅序獨不言美焉非不美也易之諸卦一事之得莫不言吉而乾之六爻辭獨不言吉焉非不吉也道盛徳備不可得而形容也有有則有之名不立無有則有之名始著蘇文忠公稱慶厯之盛曰天人和同上下歡心才智不用而道徳有餘功烈難名而福祿無窮當是時也尚復有名之可指乎愛民當思所以防民省刑新書赦文刑所以殘民亦所以厚民刑所以虐民亦所以安民今之天下惟嚴於用刑而後可以言省刑惟公於明刑而後可以言恤刑漢文帝寛仁之君也而後世之論則曰以嚴致平漢宣帝持刑之君也而當時之詔則曰務行寛大故文帝之於黎民醇厚正自其以嚴致之而宣帝之吏稱民安亦自其持刑得之吾嘗怪夫世之迂儒曲士不明聖人之㫖意姑取無用之空言以自高大曰聖人無事於刑也聖人之果無事於刑也而天下可以免刑哉故吾之所謂無刑者非世之所謂無刑也必有使之而至於無刑也恭惟主上仁民愛物與堯舜刑期無刑之意異世同符邇者曲軫宸慮哀矜庶戮之不辜親屈帝尊臨軒慮囚而又遣部使者分行諸路一清囹圄惠至渥也尚慮州縣之吏不能體悉聖意必欲如臯陶之不負所委以推廣好生之徳故愚不敢採摭陳腐而茍有贊美竊謂今之天下惟慮夫用刑之不嚴明刑之不公是以為善者良者之不幸而姦者詐者之幸用於人情之私非用於人情之公是以為天下之病也周公之詩曰既取我子毋毁我室説者曰詩人之仁也鄭伯之詩曰無踰我牆無折我桑説者曰詩人之愛也是則然矣知仁民而未知仁之方知愛物而未知愛之意與其憂我子之取孰若常固其室而不可毁與其憂我桑之折孰若常高其牆而不可踰古之立法不惟懲天下之已犯亦所以折天下之未犯葢已犯之必懲未犯所以必折也今夫民之情固喜温而惡寒欲涼而惡熱然冬不寒夏不熱則民病而死矣是故愛極者恩之所從銷寛甚者猛之所自起求用刑之䟽者必至於用刑之數求天下之喜者必反以得天下之怨理固然也故漢髙帝如此其寛仁也入關之初結天下之心如此其亟也欲除秦法之苛如此其鋭也而其與民約法亦曰殺人者死帝不以為疑民亦不以為請何則上下皆便其當然也殺人而法不死孰不相殺以至於大亂故雖髙帝欲取天下之速而不敢宥殺人之罪以䧟天下之心雖秦人之苦於苛而不以髙帝之不宥殺為帝之虐然則古之立法之意可知也已大抵始於必用而終於無所用也今之法則不然始乎不用而終於不勝用夫法不求民之入而拒民之入也古之法民不入也不招以入而民之入也不縱以出夫惟不出是以不入故始乎必用而終於無所用矣為矢者有殺人之心而天下不可廢矢也然人人而知擇焉則矢可無乎曰吾心存焉雖為矢無害也夫子未嘗廢釣弋也而所以仁禽獸者至矣是故惟君子不以所居遷所存臯陶之刑皆春風湯武之師皆時雨遇所居而遷焉斯下矣法不慮其終者必壊和糴青苗楮劵西漢而下創法垂制得三代之餘意者莫唐若也夫取民之法每患其輕重不均唐則一之以租調養兵之法每患其坐食無用唐則處之以府衛建官之法每患其名實雜糅唐則納之以六典使民不至於困兵不至於冗官不至於濫太宗之法庶幾先王者非以此歟建官之法傳之至於景龍則有墨勅斜封之濫而古制遂以壊養兵之法傳之至於開元則有長驅彍騎之制而府衛遂以變取民之法傳之至於建中則有兩税之目而租調遂以廢夫中睿之君固不足深責而張説楊炎亦非暗於事機者豈可輕改太宗之法歟葢嘗攷之丁以百畆為率租以二石為額調以䊶布為制役以二旬為限此租調之法也然無以葬者許鬻永業自狹鄉頓寛鄉者併鬻口分既許其鬻則兼并寧不啟耶已鬻者不復授則課何從均耶在府則力田畨上則宿衛無事皆農夫有事皆精卒此府衛之法也然河東河北關右隴左府之環京畿者五百餘淮南江南劔南嶺南府之在諸道者纔二十餘雖曰重内輕外何多寡之不等耶外既輕矣卒有調發豈能朝夕至耶分職率屬則曰省曰臺曰寺曰監序勞秩能則有品有爵有階有勲此建官之法也然承隋之後官不勝衆也乃驟而為七百三十事可以省也乃復增制員外在當時已不能守何以責後世之變耶太宗之法固美矣夫惟不慮其所終不稽其所弊是以雖行之一時而卒不能以行之久逺也太宗平河東立和糴法時斗米十錢餘草束八錢民樂與官為市後物貴而和糴不解遂為河東世世之患仁宗治平中詔陜西刺民號義勇又降勅榜與民約永不充軍戍邊然其後不十年義勇運粮戍邊以為常神宗熙寕中行青苗之法雖不許抑配其間情願人户乃貧不濟之人鞭撻已急則繼以逃亡逃亡之餘則均之於鄰保温公亦謂民知所償之利不知還償之害是也人主好要則百事詳治兵理財治獄擇吏古人有言主好要則百事詳主好詳則百事荒嘗探是説以考古今之治亂葢無有不原於此者三代人主虛心㳟巳以論相於上自庶言庻獄庻事不敢兼知以亂其純一而汨其聰明是以廟堂之間必得賢相而相總領衆職進退百官亦無有不得其人某人治某事某人居某職予之者不敢輕而得之者不敢慢恪守官常惟職是舉夫然後道徳政事並行而不偏廢自三代以還道揆不明而法守滋亂而不可收拾吾觀漢文帝之賢若足以超三代之治斷獄錢榖之數問之周勃又問之陳平文帝固非好要之主也武帝之英雄大畧若足以超三代之治然君除吏盡未吾亦欲除吏此言之發何為者耶武帝抑非好要之主也夫大體之不知當務之不急所謂造原立本關興衰治亂之大者一不暇講天下之事百官有司之守方叢然萃於吾身而欲兼之漢治之不古無足怪也葢嘗論之人主以一心之智慮兩耳目之聰明如其煩於獨斷而役於𤨏𤨏之常務則事理之所在必不能精講而深究之不能精講而深究則士大夫之受命承敎者必至於依違而茍且大抵天下之理造命容有不實則將命者得以乖違起事容有不中則趨事者得以鹵莽好詳之弊其極必至於此也方今天下之務莫重於兵吏其次莫重於刑獄錢榖然使廟堂之上操約御詳惟二三大臣是究是圖是信是使彼大臣既得其人則百官有司之間亦莫不各當其職夫然後付之以兵吏之事刑獄之事錢榖之事為祝者不使之治庖為工者不至於易技至於斯時誰敢不究心奉職以濟吾所欲為耶昔唐憲宗鋭意於為治杜黄裳恐不得其要因推言王者之道在修巳任賢操執綱領務得其大者至於簿書獄訟非人主所任又謂王者任人責成見功必賞有罪信罰孰敢不盡力周世宗違衆破北漢自是政無大小皆親决高錫上書以為不若擇立心公正者為宰相愛民聴訟者為守令豐財足用者使掌錢穀原情立法者使掌獄訟人主但視其功過而賞罰之何憂不治二説然矣差之毫釐異乎吾所聞也夫人主之任人將人人而任之耶抑任一相而使一相之任百官耶如其人人而任之百官有司皆出一人之所量授則與夫好詳之弊亦無以大相過也人主以多事自弊而百官有司皆以虛文為欺葢本末上下始為之顛倒錯亂不為而後可以有為昔者禹臯陶皆有絶徳也舉天下之任付諸此身可以優為而無忌也然終禹之身以功聞終臯陶之身以謨聞禹告臯陶曰乃言底可績葢責臯陶以功而臯陶乃曰予未有知臯陶告禹曰汝亦昌言葢遜禹以謨而禹則曰予何言禹終無侵謨之心臯陶終無攘功之意夫禹豈拙於發明而臯陶豈懦於有行者葢天下之事不可以兼而為而人之智慮不可以分而用以不可兼之事而加之不可分之智慮必欲盡取而為之其不廢且敗者幾希是故必有所不為於彼而後可以有為於此必有所不為於小而後可以有為於大雖禹臯陶之絶徳不敢兼也而况非禹臯陶之絶徳乎况乎所當為之事抑又難於禹之功臯陶之謨乎三代以還士君子之有為於世者自恥其才之一偏而愧其力之不能兼舉則皆取天下無窮之事一切以其身焉而任之以宰相之職而乃下為百司庶府之事弊精耗神治功益陋凡所謂造原立本關興衰理亂之大典謨吁俞以天命相飭詰者則闕焉無聞是非為彼廢此役小忘大之病乎漢興以來此病尤甚是以賈誼長太息於文帝之時曰大臣特簿書不報期㑹之間以為大故至於俗流失世敗壊因恬而不怪慮不動於耳目王吉亦言得失於宣帝曰公卿幸得遭遇其時未有建萬世之長筞舉明主於三代之隆者其務在於期㑹簿書斷獄聴訟而已此非太平之基也嗚呼風俗之不美大臣之所當慮也萬世之長䇿大臣之所當為也當慮而不慮當為而不為豈漢廷大臣之才識不逮此耶正以盡力於其小則其大者固有所不暇為也役志於其末則其本者固有所不及究也夫人之智慮雖不一禀而其精力要亦有限盡心一邑者至戴星出入僅勝百里之政而振職内史者至積旬稽審而後詔勅不相背戾彼其役役於簿書期㑹之間安能復有餘力而為當務之急耶文帝時陳平為相不對錢榖之問宣帝時丙吉為相不問横道之死傷八面鋒卷四
