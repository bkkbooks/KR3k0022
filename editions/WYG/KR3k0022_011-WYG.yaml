body:
  text: 八面鋒巻十一宋陳傅良撰無事時當預求人才擇相擇將人君之於人才不可以宴安而少緩不可以倉卒而遽求緩之於宴安則其後必危求之於倉卒則其危必不可救此天下之常理也漢髙帝定天下為吾勍敵者已亡而豪傑難制者已誅於是人才宜可少緩矣然謂周勃可為太尉謂王陵可佐以陳平其汲汲於人才尤不啻於戰爭之地也方文帝時海内得離戰伐之苦天下乂安於是人才亦可少緩然謂周亞夫緩急可用而付之景帝顧命之際惓惓不忘武帝時諸侯守藩幕北逺遁於是人才亦可少緩然援霍光於湮沒無聞之中而責以伊周之業三君之用人才當宴安無事之時兼収並蓄及一旦欲用呼吸之間固已森然在列矣何倉卒之憂乎夫周勃陳平亞夫霍光軰平居衆人固不能知其必能成功也而英雄之君獨能収之故呂氏之變而平勃出七國之變而亞夫出主幼國危而霍光出向使三君不隂察黙窺於無事之時以待一旦之用而事變之生乃彷徨四顧遽擢而急用之則顛倒狼狽者多矣其能端坐而責成功乎明皇開元之初一何人才之多及治功已成意得志滿謂宴安為可保謂倉卒為不足虞人才之在天下一皆因循不復省察胡雛之亂鋭兵長驅已陷東京而方皇皇於擇將乃聴張垍之言遂擢李巨罪亡之餘一日授以三節度而見輕於楊國忠有口打賊之譏又召封常清入見問何策以討賊常清見帝憂甚則大言以觧之曰計日可取及帥師出戰一敗塗地潼關失守兩京遂危此皆明皇不能求人才於宴安之時而急急於倉卒之過也鄭之垂亡也君臣相顧縮手無策幸而得一人焉其言曰吾不能早用子今急而求子夫向不早用而今以急求猶有一人可求也故頼以濟之如其無可求豈不殆哉元城云人主之職主於用人茍能平日有術以採聞之使皆為我用則其運用天下有餘裕矣兒寛為廷尉卒史謂不習事不主曺乃之北地視畜牧爾及為擬奏張湯始竒之上問誰為之者湯曰兒寛上曰吾故聞之乆矣又蕭望之為治禮丞上疏宣帝自在民間聞望之之名曰此東海蕭生也耶且寛身為廷尉卒史而廷尉以下皆不知之而天子深居九重乃云乆聞其名則武帝之聰明過群臣逺矣且宣帝少年在民間鬭雞走馬日遊三輔而當時賢人與民疾苦皆知之神宗朝有監司登對者上問陸賈而對以不知它日擇人按察上曰向不知陸賈者為誰朕欲知四方利病須忠信人用人要當自有所見任子進士人望薦引家世功業雜流用人之道非一端也汎觀前代或以家世或以人望或以薦引或以功業然其得失常相半焉格于皇天之後而有格于上帝之臣大駐漢中之餘而有長驅成都之禍不好文學或成安邉之功或讀父書乃有殺身之辱無非家世也起慰蒼生而王室遂安倚以成功而車戰輒敗單騎見虜而罷回紇之兵决勝千里而困赤眉之戰無非人望也以能謀之國器而得善斷之王佐以知㡬之君子而昧於多材之奸人築壇之拜本以追亡街亭之衂痛以自貶無非薦引也佐帝之功基於治齊為相之聲減於治郡㧞趙定燕者卒能施名於後世料敵合變者不能救患於應侯無非功業也是四者雖不足以盡取人之道而其大要實在於此然古人以是而得之矣將襲其迹而用之其失或在於是然則如之何而可曰家世人望之説不必廢吾於薦引功業之中果賢者而用之足矣所貴乎聖人者以其一心之明誠自有所見而不惑於其迹耳古道不振人主平日心術雜為他物汨亂是非聾其聴真偽昏其視賢否在前懵若無别一旦思所以擢用人才以起天下之治則或者進家世人望之説而又有人焉從而沮之大抵進者一沮者一擾擾焉於數者之説而無所適從嗚呼孰知夫吾之一心乃所以為用人之大本歟觀茅容之避雨者未有知容之賢者也而郭泰獨知之非泰之觀異於衆人也泰求士之心異於衆人也過冀缺之耕饁者有未知缺之敬者也而臼季獨知之者非季之見異於衆人也季求士之心異於衆人也使人速得為善之利昔栁宗元作吏商世儒皆深排而力詆之以愚觀之宗元之説責之以吾儒分内之事誠不逃議論之域也若上之人施之以救末流之弊豈不猶愈於嚴刑峻法之禁乎世儒未可以輕議宗元也且天下之中人所以勉於為善者以其知有為善之利也聖人之為天下所以上自公卿而下至匹夫一有小善不終朝而賞随之亦欲使人速得為善之利也夫使天下之中人勉強於為善而無所邀持歆羨於其間吾恐其為之之志未有乆而不輟者夫惟善方形於此利已得於彼其善愈博其利愈大則天下之凡至於得者皆將鼓舞奔走日夜惟善之歸矣何者均是利也而此以美名得之彼以不美名得之彼之所得者小而此之所得者大人豈有不棄惡而趨美辭小而就大者哉故曰宗元之説未可以輕議也但不可自吾儒言之若操賞罰以制天下者則誠不可不知此言也世儒於此又曰為善不可使人有利心嗟夫善固不可以利心而為之也然與其嚴罰峻刑制之而終不知為善孰若以利心誘之而使之樂於為善邪敢於刑人罰人不敢於誘人愚不知其説也今天下所患患無亷士也然而貪者嘗有罰而亷者未嘗有賞也故作天下之亷而不以其賞而勸誘之彼貪者無所慕而為亷也矣不可以成敗論人物古之論人者考其人而不計其功固有其才可以為而不逹不及施與既施而中奪者何可勝數而中才常人乗時以功名顯者世常有之昔司馬子長論李将軍為將其言哀痛反覆深悲其無成以為百姓知與不知皆為流涕至論霍去病無他美獨天幸不至困絶若遷者可謂不以成敗論廣也諸葛孔明偃卧隆中一見先主便及天下大計然終身奔走僅成鼎足之功而不能興先漢之業其視蕭相國之佐髙祖誠有間矣而陳壽以為管蕭之亞匹若壽者亦可謂不以成敗論孔明也孟子曰若夫成功則天也夫成敗係天君子之論豈可以是而定其賢不肖耶大夏生植而叢棘能有所庇疾風烈雨大木百圍偃仆而死秋水時至溝畎無一溉之功而嵗旱淵竭九河不足活魚鼈物之係其遭如此唯人亦然民心以先入者為主凡民之心以先入為主先入者既固則後之繼至者舉無足以搖之矣葢天下之事無定形也爵人於朝以賞善也而可疑以飾喜刑人於市以棄惡也而可疑以作威興作之鄰於生事也安静之似於因循也謂之是可也謂之非亦可也無有必然可指之定形也使人君之於天下不能有以先入乎其民而結其信心則天下於此占其終後雖有善焉亦不復以善期之也昔者嘗怪齊宣王之易牛與成湯之祝網本無以異也然一以為好生一以為貪得葢湯之民其信心先入而宣王之民則疑者為主也疑心勝則設施無是矣自古及今以疑信為是非者不獨一事也亡鐵既獲則鄰人行動無或類竊墻壊失財則鄰人勸築反疑於盜尚有真非真是也哉故人君有為之始知夫是非之被於民也於此時而著而喜怒之入於民也於斯時而堅故於斯民無惑心之初常謹其所發以一日之為而結民終身不移之信故雖役民以築臺而猶子來以勸趨植羽以從田而猶忻忻乎有喜何則所可畏者乃吾之所恃焉者也漢王項羽相與軍廣武之間而漢王數羽十罪以負入闗之約居其一議者謂羽義信不立於天下是以雖有百戰百勝之氣而不救於敗故也然鴻溝之割羽解而東歸良平一諫輒背其約而不顧立圍羽於垓下然則漢王之信義安在耶以愚觀之漢王之信固有以先入於民而項王之所以入民者則無非慓悍禍賊之是先也事不足撓為不足憂寃民姦吏昔扁鵲之見威侯知病在腠理醫和之見秦伯知病在膏肓夫在腠理則可治在膏肓則無及矣然方其病在腠理也人雖告之恬然不以為意者彼固以為不足憂也不知腠理之不足憂乃為他日膏肓之大可憂天下之事亦何以異此昔者陳侯以宋衛之治而懼之以鄭之弱而忽之遂以鄭為何能為而不許其成及兵連禍結不發於所懼之宋衛而發於所忽之鄭是不足憂者之誤陳也秦人以匈奴為強而備之以百姓為弱而輕之遂虐用其民而草芥其生及一敗塗地不在於所備之匈奴而在於所輕之百姓是不足憂者之又誤秦也天下之禍莫大於視以為不足憂視以為不足憂者皆他日之所不可支者也今天下有大患四是也然兵財之患上之人焦心而勞思下之人進計而獻議日夜惟兵財之憂至於寃民姦吏則漫不之省此愚深所未喻也意者以吏民之弱為不足憂也嗚呼腹心之隱疾烈於潰血之癰臣僕之竊伺慘於宂隙之盜賁育之不戒則童子之不能抗魯雞之不期則蜀雞之不支吏民之微弱誠有大可憂也試摭前事以言之曹參不擾獄丙吉不按贓吏人情不可使無所顧小人之情最不可使之無所顧也小人而無所顧則其心也不忸怩於為惡而安於犯天下之不義忿戾而不可解而無復冀君子之恕己故夫疾不仁者不可已甚而惡惡者不可太明是非為是姑息也將猶有以全之也古之用兵者圍師勿遏窮冦勿追豈以為不可遏且追耶葢窮而追之則示之無生意以厚其毒圍而遏之乃所以决其怒而洩其無聊之謀也豈惟用兵君子之治人亦烏可使之厚其毒而洩其無聊之謀也哉昔者秦穆公赦盜馬者三百人而又飲之以酒韓之戰出穆公於難者皆盜馬者也子孔為載書而國人弗順將誅之子産焚書而鄭衆以定夫盜不可縱也而飲之則恣惡書以治衆也而焚之則政替然則秦鄭賴焉何也葢負不宥之罪者遭非意之幸藴欲逞之怒者服不爭之化彼小人之為姦也亦非不知負天下不美之名而又有以來君子之所不赦也唯自知其負天下不美之名故赦之則猶有所愧暴之則不自惜知君子之不赦已故寛之則庻㡬於自新急之則竟其自絶之志為君子者不能少忍以徐伺其變而乃鍛鍊維策之以稔其頑則小人之無所顧也其罪豈專於小人哉亦君子者成之也為治當權利害輕重利不十者不易業功不百者不變常賢君之治天下而或至於易業變常者亦權其利害之輕重而已是故緹縈納身以贖父罪文帝為之變治王縉削爵以請兄肅宗為之推恩夫漢唐之主豈欲撓不刋之典而悦女子輔臣之意哉葢子弟之願獲伸則孝弟之風浸廣忠順之俗始成撓不刋之典而可以成忠順之俗廣孝弟之風其利害孰輕而孰重耶遇鄉人之長者則必俯伏而拜之長者仇其父則㧞刄而追之輕重先後之序不得不然也理在人心随寓而見忠義孝亷勇畧理之在人心猶元氣之在萬物也一氣之春播於品彚其根其莖其枝其葉其華其色其芬其臭雖有萬不同曷嘗有二氣哉理之在人心遇親則為孝遇君則為忠遇朋友則為義遇寇讐則為勇随一事則得一名名雖至於千萬理未嘗不一也氣無二氣理無二理然物得氣之偏故其理亦偏人得氣之全故其理亦全自古號為知人者則亦因其一善而推之是以見其孝而信其忠聞其義而知其勇吕夷簡薦徐晦曰君不負楊臨賀肯負國乎唐太宗之托李勣曰公往不負李宻肯負朕乎誠以忠孝一根義勇一源未有能孝而不能忠能勇而不能義孔門之中曽參閔子騫以孝名彼其得名豈不能為忠為勇乎三聖之中伯夷以清名彼其易時豈不能為任為和乎八面鋒卷十一
