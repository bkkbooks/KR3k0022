body:
  text: 八面鋒卷九宋陳傅良撰剛强生於柔弱之餘易至於坤之六二曰直方大不習无不利象曰六二之動直以方也夫六二其才則柔其德則中其性則順其居則正宜若偷懦畏遜而不足與有為矣然其動也内直而不撓外方而不諛而足以立天下之大功是果何為而然耶葢天下之理强不立於强而立於弱勇不成於勇而成於怯大風起於木炎炎之火不生於陽而生於隂彼六二之體以中而養柔以正而養順其養如此其發固如此所謂盛徳之至動容周旋而中者也是故真忠立於舒徐至忍生於卑遜赫然發憤躬戎服而御鞍馬者見於清净𤣥黙之主絳衣大冠見大敵而勇者亦謹厚柔順者為之嗚呼孰謂夫斂形不張而退然如怯者非大勇之所在乎豈惟人君之養勇者如此惟臣亦然趙文子其中退然如不勝衣其言呐呐然如不出口所貴者晉國管庫之士七十有餘人生不私其家死不屬其子張子房状貌如婦人卒為帝者師叚文蔚俛首拱手言氣卑弱笏撃朱泚英烈與秋霜争嚴故夫天下之人不可以形窺也自今觀文帝光武之君趙文子張子房叚文蔚諸臣必謂其委靡怯懦不足與集事而大功業一旦勃然而為之人果可以形窺哉吏愛民則民亦愛吏越訊勸農古之為吏者無所忌於民而為民者亦無忌於吏吏民不相忌故其情通而意恊情通則無乖阻意協則無鬭争古者郡邑之間吏不猜民民不疾吏懽忻怡愉如父子之相信兄弟之相愛平時追呼號召未嘗至於民之門而鞭朴笞箠亦未嘗切於民之肌膚閒則出入阡陌勞來勸相以勉其耘耔蠶織之事然而其色温然而不厲其辭委曲而不徑若有以傷民之情者故民之於吏依依切切常有戀慕感悦之意出力以供其衣食雖甚勞而不辭及無事之時則又為補葺其宫室以庶幾其無虞於風雨鳥䑕之害昔嘗讀詩而至於七月之篇則見其吏民之情相愛相親愷悌慈祥無纎毫齟齬扞格之態故曰三之日于耜四之日舉趾同我婦子饁彼南畝田畯至喜又曰春日遲遲采蘩祁祁女心傷悲其情亦可見矣以為未也又曰七月鳴鵙八月載績載𤣥載黄我朱孔揚為公子裳四月秀葽五月鳴蜩八月其穫十月隕籜一之日于貉取彼狐狸為公子裘績以為己裳而公子則以𤣥黄貉以為己裘而公子則以狐狸葢其不敢愛其身而愛其吏者如此當是時為吏者優游泮奐得以盡其志而為民者勤朴謹厚得以安其生雖有很戾無親之人咸有所慕悦而不肯疾視其上葢自秦商君設法以禁乎吏民而其情遂泮渙離散而不可復合平居吏之視民惴惴如視其仇讐民亦得間以肆其忿以毒吏葢至於秦始皇二世之際郡縣之吏屠人之父戕人之子暴驁慘毒假天子之法令以濟其㐫及夫劉項勝廣之變則紛然剸刄於郡縣之吏者不可勝數葢其勢之相激有不得不然者公私兩便則為良法常平楮幣法之在天下惟公私兩便者良法也便於公而不便於私非法也便於私而不便於公亦非法也桑𢎞羊固嘗行均輸之法矣然於公則便之於私則未便也故七福求退賈誼所以言其非切觀今日之法糴於民而用夫所謂楮幣者此亦一利也然愚不知止以利官歟以利民歟止以利官恐非朝廷所忍為也利民則未見利於民何也所用之於民亦用之於官則上下均利也今也糴則用之於民至兩税之輸而民以與官官不受與官而官不受則民持此将焉用之治世之災皆為祥瑞災異凶荒水旱先儒嘗論魯桓公三年之有年宣公十六年之大有年以為十二公多歴年所有務農重糓閔雨而書雨者豈無豐年而不見於經者是仲尼於它公皆削之而二公存而不削者以其獲罪於天宜得水旱災凶之譴今乃有年則是反常也故以為異而特存耳由是推之則凡宜災而祥者災亦祥也宜吉而凶者凶亦吉也商季之大雀秦之大稔後趙之蒼麟前史特書之者皆所以紀異也堯之水湯之旱大戊之桑糓成王之雷電以風詩書備載之者亦所以紀瑞也葢趣亡之國君臣上下相從於昏而嘉祥美瑞方間見而迭出是天時益荒其志而奪其魄也不祥莫大焉至於治安之世中外寧而事簡上下安而心逸時有以警懼之則君臣之間益脩其徳益隆其治而天下以安夫是以維持永保於無窮斯其為祥也大矣用人不可倉卒責成任相邊将縣令計臣司馬温公曰唐虞之官其居位也乆其受任也専其立法也寛其責成也逺故鯀之治水九載績用弗成然後治其罪禹之治水九州攸同然後賞其功非若京房劉邵之法校其鹽米之末責其旦夕之效也蘇文忠公曰吏人與民猶工人操器易器而操之其始莫不齟齬而不相得是故雖有長材異能之士朝夕而去則不如庸人之乆且便也自漢至今言吏治者皆推孝文之時以為任人不可以倉卒而責成功又其三嵗一遷吏不為長逺之計則其所設施一切出於苟簡至哉斯言夫世之君子苟有志於天下而欲為長乆之計則其效不可朝夕見其始若迂濶而其終必将有所觀今期月不報政則朝必以為是無能為者不待其成而去之甚可惜也夫事之有所建立其始固有不快人意而為其所沮必至於持乆而後見其效者趙充國上屯田便宜䇿公議是其計者十之三而宣帝從之留屯三年則先零罕开之屬不戰而自斃左雄立限年舉法胡廣之徒相繼上書駁其議幸而順帝右之雄在尚書三十餘年天下不敢妄選號為得人事之持乆而後見效類皆如此必若當時見沮於議者之口其亦何能有所成哉法本便民反以害民鄉兵市糶保伍常平天下之法本欲便民而反以害民者夫豈一端而已哉鄉兵之法本為民之防而其弊也操戈帶甲羣譟聚鬭横行於里閭市糶之法本為民之利而其弊也配户督限迫蹙平民有甚於租賦保伍之法所以聮比吾民隄防盜賊而其弊也差役不均執役之家至於破産天下之法本無弊也行之非其道則弊由是而生嗚呼其可坐視而不救歟良法多以權貴而沮限田考課任子外任貢舉豪右兼并之害乆矣孔光奏請諸侯皆得名田毋過三十頃而當時丁傅用事董賢隆貴皆不便之於是遂寝不行是則名田之法雖良而沮矣毁譽取人之弊乆矣京房奏考功課吏法令百官各試其功而當時石顯五鹿充宗専權皆不便之於是遂出房為郡守則是考課之法雖良而沮矣進士明經之弊乆矣楊綰奏上貢舉條目秀才問經義三十條對䇿五道而當時議者以為明經進士行之已乆皆不便之於是事寝不行則是貢舉之法雖良而沮矣良法不得其人則弊取人理財賑濟差役木之生蟲實蠧之水之濁土實渾之法之弊人實壊之賢良取人未嘗有弊也自唐散騎以李郃登科而其法始弊矣孝廉取人未始有弊也自漢廣陵以徐淑應選而其法始弊矣詞賦取人未始有弊也自崔郾私一杜牧寘異等而其法始弊矣銓選取人未始有弊也自苗晉卿私一張奭為第一而其法始弊矣昔桑𢎞羊為均輸平凖之法末年海内虚耗戶口減半未幾悉罷其所為以從民欲而劉晏用此乃能操天下贏貫而民不困而張滂皇甫鎛用之益不能給未幾李選特循晏法乃能増羨三年之後加於晏者百八十萬夫均輸平凖之法是太公九府圜法之遺意也然以𢎞羊用之則耗以晏用之則贏以滂鎛用之則不給以李選用之則增衍信乎法之在天下得其人則法以人而良不得其人則法以人而弊也善興利者惟去其害議法生財取士選法治天下有道毋為天下立法毋為百姓興利一法立一弊起一利興一害隨然則如何曰毋立法弊則革之毋興利害則除之塵去而鑑自明鑛盡而金自見弊革而法自立害除而利自興封建之法非不善也而秦更之以郡縣唐易之以藩鎮郡縣藩鎮果能無弊乎井田之政非不美也而秦更之以阡陌唐又變之以府兵阡陌府兵果能無弊乎常平義倉足以賑民矣而或為均輸或為青苗均輸青苗果勝於常平義倉乎經術詞章足以取士矣而或議三舍或具八法三舍八法果勝於經術詞賦乎法已更而弊自若利己興而害自如故夫法之在天下惟去其所以弊除其所以害則雖因今之法而有餘於弊不能去害不能除則雖百變其法而不足東坡曰漢取天下於秦因秦之法而不害於漢唐取天下於隋因隋之法而不害於唐故李文靖公沆嘗言居重位無補萬分一惟中外所陳利害一切罷之惟此少以報國爾朝廷防制纎悉備具或徇所陳請施一事所傷多矣陸象先曰庸人擾之正此謂也八面鋒卷九
